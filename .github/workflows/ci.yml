name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ugcboost

jobs:
  # ── Stage 1: Lint + Unit + Build & Push (all parallel) ──────────

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: backend
          version: v2.11.4

  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci -w web
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend/web
      - run: npx eslint src/
        working-directory: frontend/web

  lint-tma:
    name: Lint TMA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci -w tma
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend/tma
      - run: npx eslint src/
        working-directory: frontend/tma

  lint-landing:
    name: Lint Landing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci -w landing
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend/landing
      - run: npx eslint src/
        working-directory: frontend/landing

  test-unit-backend:
    name: Unit Tests Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run unit tests
        working-directory: backend
        run: go test ./... -count=1 -race -timeout 5m

  test-unit-web:
    name: Unit Tests Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci -w web
        working-directory: frontend
      - run: npm test -- --run
        working-directory: frontend/web

  test-unit-tma:
    name: Unit Tests TMA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci -w tma
        working-directory: frontend
      - run: npm test -- --run
        working-directory: frontend/tma

  test-unit-landing:
    name: Unit Tests Landing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci -w landing
        working-directory: frontend
      - run: npm test -- --run
        working-directory: frontend/landing

  build-and-push-images:
    name: Build & Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - image: backend
            context: ./backend
            file: ./backend/Dockerfile
          - image: web
            context: .
            file: frontend/web/Dockerfile
          - image: tma
            context: .
            file: frontend/tma/Dockerfile
          - image: landing
            context: .
            file: frontend/landing/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: tags
        run: echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:staging
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.tags.outputs.sha }}
