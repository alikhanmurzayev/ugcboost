name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: backend
          version: v2.11.4

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ugcboost
          POSTGRES_PASSWORD: ugcboost_test
          POSTGRES_DB: ugcboost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ugcboost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      - name: Run migrations
        run: goose -dir migrations postgres "postgres://ugcboost:ugcboost_test@localhost:5432/ugcboost_test?sslmode=disable" up
      - name: Run tests
        working-directory: backend
        run: go test ./... -count=1 -race -timeout 5m
        env:
          DATABASE_URL: postgres://ugcboost:ugcboost_test@localhost:5432/ugcboost_test?sslmode=disable

  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: web
      - run: npx tsc --noEmit
        working-directory: web

  lint-tma:
    name: Lint TMA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: tma
      - run: npx tsc --noEmit
        working-directory: tma

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, lint-web, lint-tma]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t ugcboost/backend ./backend
      - name: Build web image
        run: docker build -t ugcboost/web -f web/Dockerfile .
      - name: Build tma image
        run: docker build -t ugcboost/tma -f tma/Dockerfile .

  push-images:
    name: Push Images to GHCR
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ugcboost
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tags
        id: tags
        run: |
          SHA="sha-$(git rev-parse --short HEAD)"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          # PR builds get :staging tag, main branch gets :main tag
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "env_tag=staging" >> "$GITHUB_OUTPUT"
          else
            echo "env_tag=main" >> "$GITHUB_OUTPUT"
          fi
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ steps.tags.outputs.env_tag }}
            ${{ env.IMAGE_PREFIX }}/backend:${{ steps.tags.outputs.sha }}
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:${{ steps.tags.outputs.env_tag }}
            ${{ env.IMAGE_PREFIX }}/web:${{ steps.tags.outputs.sha }}
      - name: Build & push tma
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tma/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/tma:${{ steps.tags.outputs.env_tag }}
            ${{ env.IMAGE_PREFIX }}/tma:${{ steps.tags.outputs.sha }}
      - name: Build & push migrations
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrations
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/migrations:${{ steps.tags.outputs.env_tag }}
            ${{ env.IMAGE_PREFIX }}/migrations:${{ steps.tags.outputs.sha }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [push-images]
    steps:
      - name: Deploy backend
        run: curl -sSf -X POST "${{ secrets.DOKPLOY_WEBHOOK_BACKEND }}"
      - name: Deploy web
        run: curl -sSf -X POST "${{ secrets.DOKPLOY_WEBHOOK_WEB }}"
      - name: Deploy TMA
        run: curl -sSf -X POST "${{ secrets.DOKPLOY_WEBHOOK_TMA }}"
      - name: Health check
        run: |
          sleep 15
          curl -sSf --retry 5 --retry-delay 10 https://staging-api.ugcboost.kz/healthz
