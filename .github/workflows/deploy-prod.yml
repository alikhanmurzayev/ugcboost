name: Deploy Production

# Manual-only — Run workflow в Actions UI.
# Триггерит Dokploy webhooks для всех 4 сервисов, потом healthcheck на api.
# ВАЖНО: запускать ПОСЛЕ Migrate Production, чтобы схема БД соответствовала коду.

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy webhooks via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.PROD_HOST }}
          username: deploy
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          port: 2222
          script: |
            curl -sSf -X POST "${{ secrets.DOKPLOY_WEBHOOK_PROD_BACKEND }}"
            curl -sSf -X POST "${{ secrets.DOKPLOY_WEBHOOK_PROD_WEB }}"
            curl -sSf -X POST "${{ secrets.DOKPLOY_WEBHOOK_PROD_TMA }}"
            curl -sSf -X POST "${{ secrets.DOKPLOY_WEBHOOK_PROD_LANDING }}"
      - name: Wait for api.ugcboost.kz to roll out the new commit
        run: |
          FULL="${{ github.sha }}"
          EXPECTED="${FULL:0:7}"
          echo "expecting deployed version: $EXPECTED"
          for i in $(seq 1 60); do
            RESP=$(curl -sS https://api.ugcboost.kz/healthz 2>/dev/null || true)
            ACTUAL=$(echo "$RESP" | jq -r '.version // ""' 2>/dev/null || echo "")
            if [ "$ACTUAL" = "$EXPECTED" ]; then
              echo "deployed: $ACTUAL"
              exit 0
            fi
            echo "attempt $i/60 — got '$ACTUAL', want '$EXPECTED'"
            sleep 5
          done
          echo "api.ugcboost.kz did not roll out $EXPECTED within 5 minutes"
          exit 1
