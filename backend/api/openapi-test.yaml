openapi: "3.0.3"
info:
  title: UGCBoost Test API
  version: "0.1.0"
  description: |
    Test-only endpoints for E2E testing. Available only when ENABLE_TEST_ENDPOINTS=true.
    NEVER enabled in production.

servers:
  - url: http://localhost:8081
    description: E2E test environment

paths:
  /test/seed-user:
    post:
      operationId: seedUser
      summary: Create a test user with given credentials and role
      tags: [test]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeedUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedUserResult"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /test/reset-tokens:
    get:
      operationId: getResetToken
      summary: Get the raw reset token captured for the given email
      tags: [test]
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: Token found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetTokenResult"
        "404":
          description: No token found for this email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /test/cleanup-entity:
    post:
      operationId: cleanupEntity
      summary: Hard-delete a test entity (user or brand) and its references
      description: |
        Test-only cleanup endpoint used by the e2e cleanup stack when no
        business delete exists. For users this is a destructive hard delete
        that also wipes audit_logs, brand_managers, refresh_tokens and
        password_reset_tokens. For brands it forwards to the regular brand
        delete. NEVER enabled in production.
      tags: [test]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanupEntityRequest"
      responses:
        "204":
          description: Entity deleted
        "404":
          description: Entity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /test/telegram/sent:
    get:
      operationId: getTelegramSent
      summary: Read recorded outbound Telegram messages
      description: |
        Returns SentRecord rows captured by the in-process spy store every
        time the backend's Telegram Sender is invoked. Filter by chatId
        (always required to keep parallel e2e isolated) and optionally
        by `since` to bound the lookup. NEVER enabled in production.
      tags: [test]
      parameters:
        - name: chatId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: Telegram chat id (== TG user id for private DMs).
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Only records sent at or after this timestamp.
      responses:
        "200":
          description: Recorded messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramSentResult"

  /test/telegram/message:
    post:
      operationId: sendTelegramMessage
      summary: Inject a synthetic text message into the Telegram handler
      description: |
        Builds a minimal Telegram Update from the request body, invokes the
        in-process Telegram handler with a spy Sender, and returns whatever
        replies the handler produced. No network calls — the real long-polling
        client is bypassed entirely. NEVER enabled in production.
      tags: [test]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTelegramMessageRequest"
      responses:
        "200":
          description: Replies captured by the spy Sender
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendTelegramMessageResult"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /test/telegram/spy/fake-chat:
    post:
      operationId: telegramSpyFakeChat
      summary: Mark chatId as test-synthetic so TeeSender skips the real bot
      description: |
        Registers chatId in the spy store's fake-chat set. Subsequent
        SendMessage calls to that chat_id are recorded with success
        without involving the upstream Telegram bot. Needed by chunk-12
        e2e: synthetic creator chat_ids have no live chat for staging
        Telegram, so without this stub TeeSender would always return
        "Bad Request: chat not found" and `undelivered` could never be
        empty. NEVER enabled in production.
      tags: [test]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramSpyFakeChatRequest"
      responses:
        "204":
          description: Fake chat registered
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /test/tma/sign-init-data:
    post:
      operationId: signTMAInitData
      summary: Mint a valid Telegram WebApp initData payload for tests
      description: |
        Returns an `init_data` query string signed with the same HMAC the
        production middleware verifies. e2e suites paste the value into
        `Authorization: tma <init-data>` to exercise /tma/* endpoints
        without driving a real Telegram WebApp client. NEVER enabled in
        production.
      tags: [test]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignTMAInitDataRequest"
      responses:
        "200":
          description: Signed initData payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignTMAInitDataResult"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /test/telegram/spy/fail-next:
    post:
      operationId: telegramSpyFailNext
      summary: Force the next outbound bot send to chatId to fail
      description: |
        Registers a one-shot synthetic failure for the chat_id. The next
        SendMessage call to that chat_id returns the canonical Telegram
        error string ("Forbidden: bot was blocked by the user" by default).
        Used by chunk-12 e2e to exercise partial-success delivery without
        a real blocked-by-user account. NEVER enabled in production.
      tags: [test]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramSpyFailNextRequest"
      responses:
        "204":
          description: Failure registered
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    SeedUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [admin, brand_manager]

    SeedUserData:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, brand_manager]

    SeedUserResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/SeedUserData"

    ResetTokenData:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ResetTokenResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ResetTokenData"

    CleanupEntityRequest:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
          enum: [user, brand, creator_application, creator, campaign]
        id:
          type: string

    SendTelegramMessageRequest:
      type: object
      required: [chatId, text]
      properties:
        chatId:
          type: integer
          format: int64
          description: Synthetic chat id; echoed in the spy reply for assertions.
        text:
          type: string
          minLength: 1
          description: Message text the simulated user sends to the bot.
        userId:
          type: integer
          format: int64
          description: Synthetic Telegram user id (defaults to chatId when omitted).
        username:
          type: string
          nullable: true
          description: Optional Telegram @username (no leading @).
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true

    TelegramReply:
      type: object
      required: [chatId, text]
      properties:
        chatId:
          type: integer
          format: int64
        text:
          type: string

    SendTelegramMessageResult:
      type: object
      required: [replies]
      properties:
        replies:
          type: array
          items:
            $ref: "#/components/schemas/TelegramReply"

    TelegramSentMessage:
      type: object
      required: [chatId, text, sentAt]
      properties:
        chatId:
          type: integer
          format: int64
        text:
          type: string
        webAppUrl:
          type: string
          nullable: true
          description: |
            URL embedded into the InlineKeyboardMarkup WebApp button when
            the sender attached one. Null for plain-text messages.
        sentAt:
          type: string
          format: date-time
        error:
          type: string
          nullable: true
          description: |
            Empty when the real upstream Telegram send succeeded (or when
            running under the spy-only sender, which never errs); populated
            with the upstream error string in TeeSender mode.

    TelegramSentData:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/TelegramSentMessage"

    TelegramSentResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/TelegramSentData"

    TelegramSpyFailNextRequest:
      type: object
      required: [chatId]
      properties:
        chatId:
          type: integer
          format: int64
          description: Chat id whose next SendMessage call should fail.
        reason:
          type: string
          description: |
            Optional override for the error string the spy returns. Defaults
            to "Forbidden: bot was blocked by the user" so MapTelegramErrorToReason
            classifies it as bot_blocked.

    SignTMAInitDataRequest:
      type: object
      required: [telegramUserId]
      properties:
        telegramUserId:
          type: integer
          format: int64
          description: Telegram user id to sign on behalf of.
        authDate:
          type: integer
          format: int64
          description: |
            Optional Unix timestamp (seconds). Defaults to "now" — used by
            tests that want to exercise expired / future-dated init_data
            paths.

    SignTMAInitDataData:
      type: object
      required: [initData]
      properties:
        initData:
          type: string
          description: |
            Signed query-string ready to be passed in
            `Authorization: tma <init-data>`.

    SignTMAInitDataResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/SignTMAInitDataData"

    TelegramSpyFakeChatRequest:
      type: object
      required: [chatId]
      properties:
        chatId:
          type: integer
          format: int64
          description: Chat id to register as test-synthetic.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
