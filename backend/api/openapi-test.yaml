openapi: "3.0.3"
info:
  title: UGCBoost Test API
  version: "0.1.0"
  description: |
    Test-only endpoints for E2E testing. Available only when ENABLE_TEST_ENDPOINTS=true.
    NEVER enabled in production.

servers:
  - url: http://localhost:8081
    description: E2E test environment

paths:
  /test/seed-user:
    post:
      operationId: seedUser
      summary: Create a test user with given credentials and role
      tags: [test]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeedUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedUserResult"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /test/reset-tokens:
    get:
      operationId: getResetToken
      summary: Get the raw reset token captured for the given email
      tags: [test]
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: Token found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetTokenResult"
        "404":
          description: No token found for this email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /test/cleanup-entity:
    post:
      operationId: cleanupEntity
      summary: Hard-delete a test entity (user or brand) and its references
      description: |
        Test-only cleanup endpoint used by the e2e cleanup stack when no
        business delete exists. For users this is a destructive hard delete
        that also wipes audit_logs, brand_managers, refresh_tokens and
        password_reset_tokens. For brands it forwards to the regular brand
        delete. NEVER enabled in production.
      tags: [test]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanupEntityRequest"
      responses:
        "204":
          description: Entity deleted
        "404":
          description: Entity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /test/telegram/send-update:
    post:
      operationId: sendTelegramUpdate
      summary: Inject a Telegram update straight into the dispatcher
      description: |
        Test-only endpoint that bypasses the long-polling runner. The supplied
        payload is wrapped into a domain telegram update and pushed through the
        production dispatcher; replies the production code would have sent are
        captured by the in-memory spy client and returned in the response. Used
        by E2E tests to drive the bot without a live Telegram connection. NEVER
        enabled in production.
      tags: [test]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTelegramUpdateRequest"
      responses:
        "200":
          description: Update dispatched, captured replies returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendTelegramUpdateResult"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    SeedUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [admin, brand_manager]

    SeedUserData:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, brand_manager]

    SeedUserResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/SeedUserData"

    ResetTokenData:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ResetTokenResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ResetTokenData"

    CleanupEntityRequest:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
          enum: [user, brand, creator_application]
        id:
          type: string

    SendTelegramUpdateRequest:
      type: object
      required: [updateId, chatId, userId, text]
      properties:
        updateId:
          type: integer
          format: int64
          description: Telegram update_id — must be unique per test run for offset semantics.
        chatId:
          type: integer
          format: int64
          description: Chat id where the message was posted (in private chats equals userId).
        userId:
          type: integer
          format: int64
          description: Telegram user id of the sender.
        text:
          type: string
          description: Raw message text (e.g. "/start <uuid>").
        username:
          type: string
          nullable: true
          description: Optional Telegram @username (no leading @).
        firstName:
          type: string
          nullable: true
          description: Optional Telegram first_name.
        lastName:
          type: string
          nullable: true
          description: Optional Telegram last_name.

    TelegramReply:
      type: object
      required: [chatId, text]
      properties:
        chatId:
          type: integer
          format: int64
        text:
          type: string

    SendTelegramUpdateData:
      type: object
      required: [replies]
      properties:
        replies:
          type: array
          description: Replies the dispatcher sent through the spy client during this dispatch.
          items:
            $ref: "#/components/schemas/TelegramReply"

    SendTelegramUpdateResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/SendTelegramUpdateData"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
