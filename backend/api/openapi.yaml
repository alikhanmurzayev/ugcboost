openapi: "3.0.3"
info:
  title: UGCBoost API
  version: "0.1.0"
  description: UGCBoost platform API — contract-first, single source of truth.

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.ugcboost.kz
    description: Production

paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [system]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/login:
    post:
      operationId: login
      summary: Authenticate with email and password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: httpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token using refresh token cookie
      tags: [auth]
      responses:
        "200":
          description: Token refreshed
          headers:
            Set-Cookie:
              description: Rotated refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/logout:
    post:
      operationId: logout
      summary: Logout and invalidate refresh token
      description: |
        Public endpoint — identity is derived from the refresh-token cookie, not
        from the bearer access token. Allows a client whose access token has
        expired to still revoke its session. The Set-Cookie clear is
        unconditional (idempotent for clients without a session).
      tags: [auth]
      security: []
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              description: Cleared refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/password-reset-request:
    post:
      operationId: requestPasswordReset
      summary: Request a password reset token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequestBody"
      responses:
        "200":
          description: Reset token generated (always 200 to prevent email enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/password-reset:
    post:
      operationId: resetPassword
      summary: Reset password with a valid token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetBody"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/me:
    get:
      operationId: getMe
      summary: Get current authenticated user
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /brands:
    post:
      operationId: createBrand
      summary: Create a new brand
      tags: [brands]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandInput"
      responses:
        "201":
          description: Brand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"
    get:
      operationId: listBrands
      summary: List brands (admin sees all, manager sees own)
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBrandsResult"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /brands/{brandID}:
    parameters:
      - name: brandID
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getBrand
      summary: Get brand details with managers
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Brand details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBrandResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"
    put:
      operationId: updateBrand
      summary: Update brand
      tags: [brands]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandInput"
      responses:
        "200":
          description: Brand updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"
    delete:
      operationId: deleteBrand
      summary: Delete brand
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Brand deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /brands/{brandID}/managers:
    parameters:
      - name: brandID
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: assignManager
      summary: Assign manager to brand
      tags: [brands]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignManagerRequest"
      responses:
        "201":
          description: Manager assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignManagerResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /audit-logs:
    get:
      operationId: listAuditLogs
      summary: List audit logs (admin only)
      tags: [audit]
      security:
        - bearerAuth: []
      parameters:
        - name: actorId
          in: query
          schema:
            type: string
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/PageQueryParam"
        - $ref: "#/components/parameters/PerPageQueryParam"
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogsResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /brands/{brandID}/managers/{userID}:
    parameters:
      - name: brandID
        in: path
        required: true
        schema:
          type: string
      - name: userID
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: removeManager
      summary: Remove manager from brand
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Manager removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /dictionaries/{type}:
    get:
      operationId: listDictionary
      summary: List entries for a public dictionary (categories, cities)
      description: |
        Returns the active entries of the requested dictionary, sorted by
        sort_order then code. Used by the public landing page to render the
        category and city pickers. Public endpoint (no authentication).
      tags: [dictionaries]
      security: []
      parameters:
        - name: type
          in: path
          required: true
          description: Dictionary type to list.
          schema:
            type: string
            enum: [categories, cities]
      responses:
        "200":
          description: Dictionary entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DictionaryListResult"
        "404":
          description: Unknown dictionary type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications:
    post:
      operationId: submitCreatorApplication
      summary: Submit a creator application from the public landing page
      description: |
        Public endpoint (no authentication). Accepts creator personal data,
        social accounts, selected categories and four mandatory consents, then
        atomically stores the application, its related rows and an audit entry
        inside a single DB transaction. Returns the new application id and a
        Telegram deep-link the creator must open to bind their TG user to the
        application.
      tags: [creators]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorApplicationSubmitRequest"
      responses:
        "201":
          description: Application accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorApplicationSubmitResult"
        "409":
          description: Active application for this IIN already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications/list:
    post:
      operationId: listCreatorApplications
      summary: List creator applications with filters, search, sorting and pagination (admin only)
      description: |
        Admin-only paginated list endpoint backing the moderation UI. POST is
        used (not GET) because the search field carries PII (IIN, names, social
        handles) which `security.md` forbids in URL params. Authorisation is
        evaluated before any business logic so non-admin callers get 403
        regardless of whether matching applications exist. Pagination, sort
        field and sort order are required — there are no server-side defaults,
        the client must explicitly choose. The item shape is intentionally lean:
        list-views never expose phone, address, consents or the full Telegram
        link aggregate (only a `telegramLinked` boolean) — full PII is reserved
        for `GET /creators/applications/{id}`.
      tags: [creators]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorApplicationsListRequest"
      responses:
        "200":
          description: Page of creator applications matching the filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorApplicationsListResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Validation error (unknown sort/order, page/perPage out of range, missing required field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications/counts:
    get:
      operationId: getCreatorApplicationsCounts
      summary: Counts of creator applications grouped by status (admin only)
      description: |
        Admin-only read-only endpoint that returns the number of creator
        applications grouped by their current status. Powers the moderation UI
        notification badge: clients pick which statuses to sum (default —
        verification + moderation + awaiting_contract).

        The response is **sparse**: only statuses that currently have at least
        one application are present in `items`. Statuses without any rows are
        omitted entirely (the frontend should look up its known status with
        `find(c => c.status === STATUS_X)?.count ?? 0`). This keeps responses
        compact and makes "no applications in this status" semantically explicit.

        Authorisation is evaluated before any business logic, so non-admin
        callers receive 403 regardless of the underlying counts. No audit log
        is written for this read-only call.
      tags: [creators]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sparse list of (status, count) pairs, alphabetically sorted by status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorApplicationsCountsResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getCreatorApplication
      summary: Get full creator application aggregate (admin only)
      description: |
        Returns the full aggregate of a creator application: main personal
        fields plus linked categories, social accounts and consents. Used by
        the moderation UI to review a submitted application. Admin role is
        required — non-admin callers receive 403 regardless of whether the
        application exists, so the endpoint never leaks application IDs.
      tags: [creators]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Application aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCreatorApplicationResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /webhooks/sendpulse/instagram:
    post:
      operationId: sendPulseInstagramWebhook
      summary: SendPulse webhook for Instagram DM verification
      description: |
        SendPulse-driven Instagram DM verification. Bearer-gated by the
        SendPulse middleware. Always returns 200 `{}` past the bearer (incl.
        no-op outcomes) and 401 `{}` before — anti-fingerprinting.
      tags: [webhooks]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendPulseInstagramWebhookRequest"
      responses:
        "200":
          description: Webhook processed (always — including no-op cases).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendPulseInstagramWebhookResult"
        "401":
          description: Wrong or missing bearer secret. Body is empty — no fingerprinting.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendPulseInstagramWebhookResult"
        default:
          $ref: "#/components/responses/UnexpectedError"

components:
  parameters:
    PageQueryParam:
      name: page
      in: query
      description: 1-based page index.
      schema:
        type: integer
        minimum: 1
    PerPageQueryParam:
      name: perPage
      in: query
      description: Page size, between 1 and 200 inclusive.
      schema:
        type: integer
        minimum: 1
        maximum: 200

  responses:
    UnexpectedError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: dev

    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. CREATOR_NOT_FOUND)
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable fallback message (English)
          example: Invalid input

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/APIError"

    MessageData:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Operation successful

    MessageResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/MessageData"

    UserRole:
      type: string
      description: Role of an authenticated user.
      enum: [admin, brand_manager]

    ConsentType:
      type: string
      description: Canonical consent type captured at creator application submission.
      enum: [processing, third_party, cross_border, terms]

    CreatorApplicationStatus:
      type: string
      description: |
        Lifecycle status of a creator application. Values follow the state
        machine described in `_bmad-output/planning-artifacts/creator-application-state-machine.md`.
      enum: [verification, moderation, awaiting_contract, contract_sent, signed, rejected, withdrawn]

    PaginationInput:
      type: object
      description: Shared 1-based pagination payload for body-paginated list endpoints.
      required: [page, perPage]
      properties:
        page:
          type: integer
          minimum: 1
          description: 1-based page index.
        perPage:
          type: integer
          minimum: 1
          maximum: 200
          description: Page size, between 1 and 200 inclusive.

    DictionaryItem:
      type: object
      description: |
        Single entry from a public dictionary (categories, cities, etc.).
        Reused for the dictionary-listing endpoint and for hydrated dictionary
        references on creator-application reads, where the backend falls back
        to `(code, code, 0)` when the underlying dictionary row has been
        deactivated.
      required: [code, name, sortOrder]
      properties:
        code:
          type: string
          description: Stable machine-readable identifier (snake_case).
        name:
          type: string
          description: Human-readable label rendered to the user.
        sortOrder:
          type: integer
          description: Sort key — lower values appear first in the UI.

    DictionaryListResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ListDictionaryData"

    ListDictionaryData:
      type: object
      required: [type, items]
      properties:
        type:
          type: string
          description: Dictionary type echoed back to the client.
        items:
          type: array
          items:
            $ref: "#/components/schemas/DictionaryItem"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@ugcboost.kz
        password:
          type: string
          minLength: 6
          example: "password123"

    LoginData:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    LoginResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/LoginData"

    PasswordResetRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetBody:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 6

    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"

    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/User"

    BrandInput:
      type: object
      description: Mutable subset of a brand — used for create and update.
      required: [name]
      properties:
        name:
          type: string
        logoUrl:
          type: string

    Brand:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BrandResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Brand"

    BrandListItem:
      type: object
      required: [id, name, managerCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
        managerCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListBrandsData:
      type: object
      required: [brands]
      properties:
        brands:
          type: array
          items:
            $ref: "#/components/schemas/BrandListItem"

    ListBrandsResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ListBrandsData"

    ManagerInfo:
      type: object
      required: [userId, email, assignedAt]
      properties:
        userId:
          type: string
        email:
          type: string
        assignedAt:
          type: string
          format: date-time

    BrandDetailData:
      type: object
      required: [id, name, createdAt, updatedAt, managers]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        managers:
          type: array
          items:
            $ref: "#/components/schemas/ManagerInfo"

    GetBrandResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/BrandDetailData"

    AssignManagerRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string

    AssignManagerData:
      type: object
      required: [userId, email, role]
      properties:
        userId:
          type: string
        email:
          type: string
        role:
          type: string
        tempPassword:
          type: string

    AssignManagerResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AssignManagerData"

    AuditLogEntry:
      type: object
      required: [id, actorRole, action, entityType, ipAddress, createdAt]
      properties:
        id:
          type: string
        actorId:
          type: string
          nullable: true
          description: Null for system / public actions (e.g. public creator application submit).
        actorRole:
          type: string
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        oldValue: {}
        newValue: {}
        ipAddress:
          type: string
        createdAt:
          type: string
          format: date-time

    ListAuditLogsData:
      type: object
      required: [logs, total, page, perPage]
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        total:
          type: integer
          format: int64
        page:
          type: integer
        perPage:
          type: integer

    AuditLogsResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ListAuditLogsData"

    SocialPlatform:
      type: string
      description: Supported social network for creator accounts (MVP scope).
      enum: [instagram, tiktok, threads]

    SocialVerificationMethod:
      type: string
      description: |
        How a social account was verified. `auto` — webhook from SendPulse caught
        the verification code in an Instagram DM. `manual` — admin marked the
        social as verified from the application drawer.
      enum: [auto, manual]

    SocialAccountInput:
      type: object
      required: [platform, handle]
      properties:
        platform:
          $ref: "#/components/schemas/SocialPlatform"
        handle:
          type: string
          description: Account handle or public identifier on the given platform.
          minLength: 1
          maxLength: 128

    CreatorApplicationSubmitRequest:
      type: object
      required:
        - lastName
        - firstName
        - iin
        - phone
        - city
        - categories
        - socials
        - acceptedAll
      properties:
        lastName:
          type: string
          minLength: 1
          maxLength: 128
        firstName:
          type: string
          minLength: 1
          maxLength: 128
        middleName:
          type: string
          maxLength: 128
          description: Optional patronymic (not every applicant has one).
        iin:
          type: string
          description: Kazakhstani individual identification number (12 digits).
          pattern: "^[0-9]{12}$"
        phone:
          type: string
          minLength: 1
          maxLength: 32
        city:
          type: string
          minLength: 1
          maxLength: 128
        address:
          type: string
          nullable: true
          maxLength: 512
          description: |
            Optional legal/postal address. Empty on the landing form (the bot
            collects it later); admins may patch it via moderation tooling.
        categories:
          type: array
          description: |
            One or more category codes from the categories catalogue. Must be non-empty.
            Maximum three codes; submissions with more are rejected with 422.
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 64
        categoryOtherText:
          type: string
          nullable: true
          maxLength: 200
          description: |
            Free-text description of the creator's niche when "other" appears in
            categories. Required when "other" is present (otherwise the request is
            rejected with 422 VALIDATION_ERROR). Ignored when "other" is absent.
        socials:
          type: array
          description: One or more social accounts. Multiple handles on the same platform are allowed.
          minItems: 1
          items:
            $ref: "#/components/schemas/SocialAccountInput"
        acceptedAll:
          type: boolean
          description: |
            Single consent flag covering all four canonical consent types
            (processing / third_party / cross_border / terms). The legal model
            (privacy-policy.md §9.2) treats acceptance of the Privacy Policy as
            unconditional consent to all four. Backend writes four rows in
            creator_application_consents bound to the current document versions.
            Must be true; otherwise the request is rejected with 422 MISSING_CONSENT.

    CreatorApplicationSubmitData:
      type: object
      required: [applicationId, telegramBotUrl]
      properties:
        applicationId:
          type: string
          format: uuid
          description: UUID of the newly created application (also embedded into the bot deep-link).
        telegramBotUrl:
          type: string
          format: uri
          description: Deep-link to the Telegram bot carrying application id as start parameter.

    CreatorApplicationSubmitResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApplicationSubmitData"

    CreatorApplicationDetailSocial:
      type: object
      required: [platform, handle, verified]
      properties:
        platform:
          $ref: "#/components/schemas/SocialPlatform"
        handle:
          type: string
        verified:
          type: boolean
          description: Whether the creator's ownership of this social account has been confirmed.
        method:
          $ref: "#/components/schemas/SocialVerificationMethod"
          nullable: true
          description: Path used to verify ownership; null while the account is unverified.
        verifiedByUserId:
          type: string
          format: uuid
          nullable: true
          description: Admin who pressed the manual-verify button. Null on auto and on unverified rows.
        verifiedAt:
          type: string
          format: date-time
          nullable: true
          description: When verification succeeded; null while the account is unverified.

    CreatorApplicationDetailConsent:
      type: object
      required: [consentType, acceptedAt, documentVersion, ipAddress, userAgent]
      properties:
        consentType:
          $ref: "#/components/schemas/ConsentType"
        acceptedAt:
          type: string
          format: date-time
        documentVersion:
          type: string
          description: Document version stamp recorded at the moment of consent.
        ipAddress:
          type: string
          description: Client IP recorded at submission (raw stored as-is).
        userAgent:
          type: string
          description: Truncated User-Agent recorded at submission.

    TelegramLink:
      type: object
      description: Telegram account linked to a creator application via /start deep-link.
      required: [telegramUserId, linkedAt]
      properties:
        telegramUserId:
          type: integer
          format: int64
          description: Telegram numeric user id (BIGINT) — stable identifier of the linked account.
        telegramUsername:
          type: string
          nullable: true
          description: Telegram @username at link time (no leading @). Nullable.
        telegramFirstName:
          type: string
          nullable: true
          description: Telegram first_name at link time. Nullable.
        telegramLastName:
          type: string
          nullable: true
          description: Telegram last_name at link time. Nullable.
        linkedAt:
          type: string
          format: date-time
          description: Timestamp of the successful link.

    CreatorApplicationDetailData:
      type: object
      required:
        - id
        - lastName
        - firstName
        - iin
        - birthDate
        - phone
        - city
        - status
        - verificationCode
        - createdAt
        - updatedAt
        - categories
        - socials
        - consents
        - telegramBotUrl
      properties:
        id:
          type: string
          format: uuid
        verificationCode:
          type: string
          description: |
            6-digit `UGC-NNNNNN` code the creator must DM to the official
            Instagram for auto-verification. Visible only via this admin
            endpoint — never returned by public/landing routes.
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        iin:
          type: string
          description: Kazakhstani individual identification number (12 digits).
        birthDate:
          type: string
          format: date
          description: Birth date derived from the IIN at submission time.
        phone:
          type: string
        city:
          $ref: "#/components/schemas/DictionaryItem"
        address:
          type: string
          nullable: true
        categoryOtherText:
          type: string
          nullable: true
          description: Free-text niche description when categories include "other".
        status:
          $ref: "#/components/schemas/CreatorApplicationStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        categories:
          type: array
          description: Categories selected by the creator, sorted by sort_order then code.
          items:
            $ref: "#/components/schemas/DictionaryItem"
        socials:
          type: array
          description: Social accounts attached to the application, sorted by platform then handle.
          items:
            $ref: "#/components/schemas/CreatorApplicationDetailSocial"
        consents:
          type: array
          description: |
            Consents in canonical order (processing → third_party → cross_border → terms),
            independent of the order they appear in the database.
          items:
            $ref: "#/components/schemas/CreatorApplicationDetailConsent"
        telegramLink:
          allOf:
            - $ref: "#/components/schemas/TelegramLink"
          nullable: true
          description: |
            Telegram account linked to this application. Null when the creator
            has not yet opened the bot.
        telegramBotUrl:
          type: string
          description: |
            Deep-link in form `https://t.me/{bot}?start={applicationId}`. The
            admin shares it with the creator (e.g. via WhatsApp) when
            `telegramLink` is null. Always returned regardless of link state so
            the response shape stays stable; the frontend renders the copy
            action only when not yet bound.

    GetCreatorApplicationResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApplicationDetailData"

    CreatorApplicationListSortField:
      type: string
      description: |
        Sort field for the admin list. Mapped to a SQL column / expression on
        the backend. Unknown values are rejected with 422.
      enum: [created_at, updated_at, full_name, birth_date, city_name]

    SortOrder:
      type: string
      description: Sort direction.
      enum: [asc, desc]

    CreatorApplicationsListRequest:
      description: |
        Filter, search, sort and pagination payload for the admin list. All
        filter fields are optional and combined with AND between fields, OR
        (any-of) within a single array. Empty/whitespace `search` is ignored.
      allOf:
        - $ref: "#/components/schemas/PaginationInput"
        - type: object
          required: [sort, order]
          properties:
            statuses:
              type: array
              description: Match any of these statuses. Empty/missing → all statuses.
              items:
                $ref: "#/components/schemas/CreatorApplicationStatus"
            cities:
              type: array
              description: Match any of these city codes (from the cities dictionary).
              items:
                type: string
                minLength: 1
                maxLength: 64
            categories:
              type: array
              description: Match applications that include any of these category codes.
              items:
                type: string
                minLength: 1
                maxLength: 64
            dateFrom:
              type: string
              format: date-time
              description: Inclusive lower bound for `created_at`.
            dateTo:
              type: string
              format: date-time
              description: Inclusive upper bound for `created_at`.
            ageFrom:
              type: integer
              minimum: 0
              maximum: 120
              description: Inclusive lower bound for the creator's age in full years (computed from birth_date).
            ageTo:
              type: integer
              minimum: 0
              maximum: 120
              description: Inclusive upper bound for the creator's age in full years.
            telegramLinked:
              type: boolean
              description: |
                When true, only applications already bound to a Telegram account
                are returned. When false, only those still without a link.
                Missing/null disables the filter.
            search:
              type: string
              maxLength: 128
              description: |
                Free-text search across last_name, first_name, middle_name, IIN
                (case-insensitive) and social-account handles. Trimmed; empty/blank
                after trim disables the filter. Carries PII — the endpoint is POST
                so this never lands in URL params.
            sort:
              $ref: "#/components/schemas/CreatorApplicationListSortField"
            order:
              $ref: "#/components/schemas/SortOrder"

    CreatorApplicationListItem:
      type: object
      required:
        - id
        - status
        - lastName
        - firstName
        - birthDate
        - city
        - categories
        - socials
        - telegramLinked
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/CreatorApplicationStatus"
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
        city:
          $ref: "#/components/schemas/DictionaryItem"
        categories:
          type: array
          description: Categories selected by the creator, sorted by sort_order then code.
          items:
            $ref: "#/components/schemas/DictionaryItem"
        socials:
          type: array
          description: Social accounts attached to the application, sorted by platform then handle.
          items:
            $ref: "#/components/schemas/CreatorApplicationDetailSocial"
        telegramLinked:
          type: boolean
          description: True when the creator has bound a Telegram account via /start.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatorApplicationsListData:
      type: object
      required: [items, total, page, perPage]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreatorApplicationListItem"
        total:
          type: integer
          format: int64
          description: Total number of matching applications across all pages.
        page:
          type: integer
        perPage:
          type: integer

    CreatorApplicationsListResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApplicationsListData"

    CreatorApplicationStatusCount:
      type: object
      description: Single (status, count) pair returned by GET /creators/applications/counts.
      required: [status, count]
      properties:
        status:
          $ref: "#/components/schemas/CreatorApplicationStatus"
        count:
          type: integer
          format: int64
          minimum: 0
          description: Number of creator applications currently in this status.

    CreatorApplicationsCountsData:
      type: object
      description: |
        Sparse counts payload — see the operation description on the
        `getCreatorApplicationsCounts` endpoint for the contract details.
        `items` is alphabetically sorted by `status` for deterministic output.
      required: [items]
      properties:
        items:
          type: array
          description: Sparse list — only statuses with at least one application appear here.
          items:
            $ref: "#/components/schemas/CreatorApplicationStatusCount"

    CreatorApplicationsCountsResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApplicationsCountsData"

    SendPulseInstagramWebhookRequest:
      type: object
      description: |
        Custom JSON payload SendPulse delivers from the Instagram chatbot.
        `username` and `lastMessage` come from the configured "send custom
        data" action; `contactId` is SendPulse's opaque contact identifier
        kept for trace correlation.
      required: [username, lastMessage]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 256
          description: Instagram handle of the message sender as SendPulse received it.
        lastMessage:
          type: string
          minLength: 1
          maxLength: 4096
          description: Body of the last message in the IG DM thread.
        contactId:
          type: string
          maxLength: 256
          description: Optional SendPulse contact id; opaque to backend, kept for correlation.

    SendPulseInstagramWebhookResult:
      type: object
      description: |
        Empty object — the SendPulse webhook never carries data back. Both
        success (200) and the constant-time auth failure (401) emit the
        same `{}` body.

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
