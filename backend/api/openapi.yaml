openapi: "3.0.3"
info:
  title: UGCBoost API
  version: "0.1.0"
  description: UGCBoost platform API — contract-first, single source of truth.

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.ugcboost.kz
    description: Production

paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [system]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/login:
    post:
      operationId: login
      summary: Authenticate with email and password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: httpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token using refresh token cookie
      tags: [auth]
      responses:
        "200":
          description: Token refreshed
          headers:
            Set-Cookie:
              description: Rotated refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/logout:
    post:
      operationId: logout
      summary: Logout and invalidate refresh token
      description: |
        Public endpoint — identity is derived from the refresh-token cookie, not
        from the bearer access token. Allows a client whose access token has
        expired to still revoke its session. The Set-Cookie clear is
        unconditional (idempotent for clients without a session).
      tags: [auth]
      security: []
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              description: Cleared refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/password-reset-request:
    post:
      operationId: requestPasswordReset
      summary: Request a password reset token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequestBody"
      responses:
        "200":
          description: Reset token generated (always 200 to prevent email enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/password-reset:
    post:
      operationId: resetPassword
      summary: Reset password with a valid token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetBody"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /auth/me:
    get:
      operationId: getMe
      summary: Get current authenticated user
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /brands:
    post:
      operationId: createBrand
      summary: Create a new brand
      tags: [brands]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandInput"
      responses:
        "201":
          description: Brand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"
    get:
      operationId: listBrands
      summary: List brands (admin sees all, manager sees own)
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBrandsResult"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /brands/{brandID}:
    parameters:
      - name: brandID
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getBrand
      summary: Get brand details with managers
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Brand details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBrandResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"
    put:
      operationId: updateBrand
      summary: Update brand
      tags: [brands]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandInput"
      responses:
        "200":
          description: Brand updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"
    delete:
      operationId: deleteBrand
      summary: Delete brand
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Brand deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /brands/{brandID}/managers:
    parameters:
      - name: brandID
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: assignManager
      summary: Assign manager to brand
      tags: [brands]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignManagerRequest"
      responses:
        "201":
          description: Manager assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignManagerResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /audit-logs:
    get:
      operationId: listAuditLogs
      summary: List audit logs (admin only)
      tags: [audit]
      security:
        - bearerAuth: []
      parameters:
        - name: actorId
          in: query
          schema:
            type: string
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/PageQueryParam"
        - $ref: "#/components/parameters/PerPageQueryParam"
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogsResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /brands/{brandID}/managers/{userID}:
    parameters:
      - name: brandID
        in: path
        required: true
        schema:
          type: string
      - name: userID
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: removeManager
      summary: Remove manager from brand
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Manager removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /dictionaries/{type}:
    get:
      operationId: listDictionary
      summary: List entries for a public dictionary (categories, cities)
      description: |
        Returns the active entries of the requested dictionary, sorted by
        sort_order then code. Used by the public landing page to render the
        category and city pickers. Public endpoint (no authentication).
      tags: [dictionaries]
      security: []
      parameters:
        - name: type
          in: path
          required: true
          description: Dictionary type to list.
          schema:
            type: string
            enum: [categories, cities]
      responses:
        "200":
          description: Dictionary entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DictionaryListResult"
        "404":
          description: Unknown dictionary type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications:
    post:
      operationId: submitCreatorApplication
      summary: Submit a creator application from the public landing page
      description: |
        Public endpoint (no authentication). Accepts creator personal data,
        social accounts, selected categories and four mandatory consents, then
        atomically stores the application, its related rows and an audit entry
        inside a single DB transaction. Returns the new application id and a
        Telegram deep-link the creator must open to bind their TG user to the
        application.
      tags: [creators]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorApplicationSubmitRequest"
      responses:
        "201":
          description: Application accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorApplicationSubmitResult"
        "409":
          description: Active application for this IIN already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications/list:
    post:
      operationId: listCreatorApplications
      summary: List creator applications with filters, search, sorting and pagination (admin only)
      description: |
        Admin-only paginated list endpoint backing the moderation UI. POST is
        used (not GET) because the search field carries PII (IIN, names, social
        handles) which `security.md` forbids in URL params. Authorisation is
        evaluated before any business logic so non-admin callers get 403
        regardless of whether matching applications exist. Pagination, sort
        field and sort order are required — there are no server-side defaults,
        the client must explicitly choose. The item shape is intentionally lean:
        list-views never expose phone, address, consents or the full Telegram
        link aggregate (only a `telegramLinked` boolean) — full PII is reserved
        for `GET /creators/applications/{id}`.
      tags: [creators]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorApplicationsListRequest"
      responses:
        "200":
          description: Page of creator applications matching the filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorApplicationsListResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Validation error (unknown sort/order, page/perPage out of range, missing required field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications/counts:
    get:
      operationId: getCreatorApplicationsCounts
      summary: Counts of creator applications grouped by status (admin only)
      description: |
        Admin-only read-only endpoint that returns the number of creator
        applications grouped by their current status. Powers the moderation UI
        notification badge: clients pick which statuses to sum (default —
        verification + moderation).

        The response is **sparse**: only statuses that currently have at least
        one application are present in `items`. Statuses without any rows are
        omitted entirely (the frontend should look up its known status with
        `find(c => c.status === STATUS_X)?.count ?? 0`). This keeps responses
        compact and makes "no applications in this status" semantically explicit.

        Authorisation is evaluated before any business logic, so non-admin
        callers receive 403 regardless of the underlying counts. No audit log
        is written for this read-only call.
      tags: [creators]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sparse list of (status, count) pairs, alphabetically sorted by status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorApplicationsCountsResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getCreatorApplication
      summary: Get full creator application aggregate (admin only)
      description: |
        Returns the full aggregate of a creator application: main personal
        fields plus linked categories, social accounts and consents. Used by
        the moderation UI to review a submitted application. Admin role is
        required — non-admin callers receive 403 regardless of whether the
        application exists, so the endpoint never leaks application IDs.
      tags: [creators]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Application aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCreatorApplicationResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications/{id}/socials/{socialId}/verify:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: socialId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: verifyCreatorApplicationSocial
      summary: Mark a creator application's social account as manually verified (admin only)
      description: |
        Admin-only action that marks one social account on an application as
        `manual`-verified under the admin's responsibility, then transitions
        the application `verification → moderation` (manual verification is
        the only path forward when the auto-verify webhook cannot run, e.g.
        TikTok/Threads-only applications). The endpoint refuses to run
        unless the creator has already linked Telegram via the bot — without
        a chat we cannot reach them after approval.

        The action is admin-only because it bypasses the SendPulse code
        match — the admin asserts ownership of the handle by hand. No body
        is accepted; the actor uuid comes from the bearer token. Empty
        success payload by design — caller refetches the application to
        observe the new status.
      tags: [creators]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Social marked verified, application moved to moderation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Application or social not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Social already verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            Application is not in `verification` status, or the creator has
            not yet linked Telegram via the bot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications/{id}/reject:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: rejectCreatorApplication
      summary: Reject a creator application (admin only)
      description: |
        Admin-only action that moves an application to the terminal `rejected`
        status from either `verification` or `moderation`. The state-machine
        edge is guarded server-side: any other source status returns 422
        `CREATOR_APPLICATION_NOT_REJECTABLE`. The rejection is persisted as a
        `creator_application_status_transitions` row plus an audit entry; the
        Telegram link is preserved on the application so the bot can later
        notify the creator (chunk 14) and so future broadcast flows can still
        reach this account.

        No body is accepted — there are no categorisation fields, no internal
        notes, no creator-facing message in the request. The Telegram message
        sent to the creator (chunk 14) is a single static template; updates to
        that copy ship via separate PRs and are not parameterised here.

        Repeated rejection of an already-rejected application returns 422
        `CREATOR_APPLICATION_NOT_REJECTABLE`. This is intentional: callers
        observing 422 know the action did not happen on this request, while
        the database state remains the canonical source of truth.
      tags: [creators]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Application moved to `rejected`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            Application is not in a status from which `rejected` is reachable
            (`verification` or `moderation`). Includes the case of repeating
            reject on an already-rejected application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/applications/{id}/approve:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: approveCreatorApplication
      summary: Approve a creator application (admin only)
      description: |
        Admin-only action that promotes an application from `moderation` to the
        terminal `approved` status. The transition is guarded server-side: any
        other source status returns 422 `CREATOR_APPLICATION_NOT_APPROVABLE`.
        The approve also snapshots the application into the new `creators`
        entity (plus its socials and categories) inside the same transaction,
        so a creator row is guaranteed to exist if and only if the application
        moved to `approved`. The approval is persisted as a
        `creator_application_status_transitions` row plus an audit entry.

        The application's Telegram link is required: an application without a
        link is refused with 422 `CREATOR_APPLICATION_TELEGRAM_NOT_LINKED`,
        because the only channel for the bot to notify the approved creator
        is the bound chat. After commit, the bot sends a static congratulation
        message — updates to that copy ship via separate PRs.

        The body is optional. When omitted (or `campaignIds` is empty/null),
        the response carries the freshly-created `creatorId` so callers can
        navigate to the creator aggregate (read endpoint ships separately).

        Repeated approve of an already-approved application returns 422
        `CREATOR_APPLICATION_NOT_APPROVABLE`. Concurrent approves on the same
        application produce exactly one 200 (winner) and exactly one 422; the
        UNIQUE constraint on `creators.source_application_id` aborts the loser
        atomically along with the entire transaction it tried to run.

        The optional `campaignIds` array attaches the freshly-created creator
        to the listed campaigns right after approve (`planned` status, one
        `campaign_creator_add` audit-row per campaign). Validation runs in
        the handler before any state change: more than 20 ids → 422
        `CAMPAIGN_IDS_TOO_MANY`, duplicates → 422 `CAMPAIGN_IDS_DUPLICATES`,
        any non-existent or soft-deleted campaign → 422
        `CAMPAIGN_NOT_AVAILABLE_FOR_ADD`. Adds run sequentially after the
        approve transaction commits and the Telegram congratulation fires;
        a mid-cycle failure on the N-th campaign returns 422
        `CAMPAIGN_ADD_AFTER_APPROVE_FAILED` — the creator is already
        materialised and earlier campaigns remain attached, so the admin
        finishes the rest manually through the campaign UI.
      tags: [creators]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorApprovalInput"
      responses:
        "200":
          description: Application moved to `approved`; `creatorId` returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorApprovalResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            Application is not in a status from which `approved` is reachable
            (only `moderation`), the application has no Telegram link, the
            corresponding creator row already exists, the Telegram account
            is already taken by another creator, the optional `campaignIds`
            array fails validation (`CAMPAIGN_IDS_TOO_MANY`,
            `CAMPAIGN_IDS_DUPLICATES`, `CAMPAIGN_NOT_AVAILABLE_FOR_ADD`),
            or the post-approve add-loop failed mid-cycle
            (`CAMPAIGN_ADD_AFTER_APPROVE_FAILED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/list:
    post:
      operationId: listCreators
      summary: List approved creators with filters, search, sorting and pagination (admin only)
      description: |
        Admin-only paginated list endpoint backing the campaign-side catalog.
        POST is used (not GET) because the search field carries PII (IIN,
        names, social handles, phone, telegram_username) which `security.md`
        forbids in URL params. Authorisation is evaluated before any business
        logic so non-admin callers get 403 regardless of whether matching
        creators exist. Pagination, sort field and sort order are required —
        there are no server-side defaults, the client must explicitly choose.

        The item shape is intentionally lean: list-views surface identity,
        contact details that admins copy from the table (phone,
        telegram_username) and the dictionary-hydrated city/categories. Full
        PII (address, category_other_text, the source application id, the
        full Telegram block) is reserved for `GET /creators/{id}`. LiveDune
        analytics, completed-orders metrics and TrustMe sign-state are
        deliberately out of scope for this chunk and ship in follow-ups.
      tags: [creators]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorsListRequest"
      responses:
        "200":
          description: Page of approved creators matching the filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorsListResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Validation error (unknown sort/order, page/perPage out of range, malformed filters)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /creators/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getCreator
      summary: Get full creator aggregate (admin only)
      description: |
        Returns the full creator profile aggregate: identity, plain PII, the
        flat Telegram block, the snapshot of social accounts (with their
        verification metadata copied from the originating application) and the
        category codes resolved against the active dictionary. Admin role is
        required — non-admin callers receive 403 regardless of whether the
        creator exists, so the endpoint never leaks creator IDs.

        Deactivated dictionary codes (a city or category whose row was hidden
        after the creator was approved) degrade gracefully: the code stays
        intact and the localised name falls back to the code itself, so the
        admin still sees the historical reference instead of getting a 500.
      tags: [creators]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Creator aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCreatorResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Creator not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /campaigns:
    post:
      operationId: createCampaign
      summary: Create a marketing campaign (admin-only)
      description: |
        Creates a new marketing campaign. The TMA-side ТЗ landing page lives
        at a hardcoded secret URL inside the TMA app; the URL is stored here
        only to be embedded into outbound creator-invite messages. Name is
        unique among non-deleted campaigns (partial unique index).
      tags: [campaigns]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignCreatedResult"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Campaign name already taken among non-deleted campaigns.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"
    get:
      operationId: listCampaigns
      summary: List marketing campaigns with pagination, search and filter (admin-only)
      description: |
        Admin-only paginated list of marketing campaigns. Authorisation is
        evaluated before any business logic so non-admin callers receive 403
        regardless of whether matching campaigns exist. Pagination, sort field
        and order are required — there are no server-side defaults, the client
        must explicitly choose. The item shape is the same `Campaign` schema
        as `GET /campaigns/{id}` so frontends share one mapping.

        GET (not POST) is used because campaign `name` is admin-curated and
        carries no PII; the security.md prohibition on PII in URL params does
        not apply here.
      tags: [campaigns]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100000
          description: 1-based page number.
        - name: perPage
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 200
          description: Page size.
        - name: sort
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/CampaignListSortField"
        - name: order
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SortOrder"
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 128
          description: |
            Free-text substring search over campaign name (case-insensitive).
            Trimmed; empty/blank after trim disables the filter. Special
            ILIKE characters (`%`, `_`, `\`) are escaped server-side so they
            match literally.
        - name: isDeleted
          in: query
          required: false
          schema:
            type: boolean
          description: |
            true → only soft-deleted campaigns. false → only live. Missing
            disables the filter (returns both live and soft-deleted rows).
      responses:
        "200":
          description: Page of campaigns matching the filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignsListResult"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Validation error (unknown sort/order, page/perPage out of range, search too long)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /campaigns/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getCampaign
      summary: Get a marketing campaign by id (admin-only)
      description: |
        Returns the full campaign by id. Admin role is required — non-admin
        callers receive 403 regardless of whether the campaign exists, so the
        endpoint never leaks campaign IDs.

        The response includes soft-deleted campaigns (`isDeleted=true`) so
        admins can audit and restore deletions. The list endpoint exposes a
        filter for the live/deleted split; the per-id read deliberately does
        not.
      tags: [campaigns]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Campaign aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCampaignResult"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"
    patch:
      operationId: updateCampaign
      summary: Update a marketing campaign by id (admin-only)
      description: |
        Full-replace update of the mutable subset of a campaign (`name`,
        `tmaUrl`). Admin role is required — non-admin callers receive 403
        before any DB read, so the endpoint never leaks campaign IDs.

        Soft-deleted campaigns remain editable: the per-id read endpoint
        already exposes them and the moderation UI may need to fix typos
        on archived rows. The success response is intentionally empty
        (204 No Content) — clients refetch via GET /campaigns/{id} to
        observe the new state.

        Race against the partial unique index
        `campaigns_name_active_unique` (WHERE is_deleted = false) on
        `name` is translated by the repo into 409 CAMPAIGN_NAME_TAKEN.
      tags: [campaigns]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "204":
          description: Campaign updated.
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Campaign name already taken among non-deleted campaigns.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            Validation error. CAMPAIGN_TMA_URL_LOCKED — `tmaUrl` cannot be
            changed once any creator in this campaign has been invited
            (`invited_count > 0`); the existing Telegram messages already
            embed the previous URL via inline `web_app` button. Other
            shape/format violations surface as VALIDATION_ERROR.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /campaigns/{id}/creators:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: addCampaignCreators
      summary: Add creators to a campaign in batch (admin-only)
      description: |
        Batch-adds creators to a campaign in initial state `planned`. Per
        creator one row is inserted into `campaign_creators` and one
        `campaign_creator_add` audit-row is appended in the same transaction.
        Strict-422: any invalid creatorId or conflict (already in this
        campaign, creator does not exist) rolls back the whole batch — no
        partial inserts.

        Soft-deleted campaigns (`isDeleted=true`) are treated as not found
        (404) for these endpoints, unlike GET /campaigns/{id} which
        deliberately returns soft-deleted rows for audit / restore. State
        machine transitions for invite / accept / decline are out of scope —
        this chunk only covers `→ planned`.
      tags: [campaigns]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCampaignCreatorsInput"
      responses:
        "201":
          description: Creators added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddCampaignCreatorsResult"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Campaign not found (missing or soft-deleted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error (empty / more than 200 / duplicate creatorIds, creator does not exist, already in this campaign).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"
    get:
      operationId: listCampaignCreators
      summary: List creators attached to a campaign (admin-only)
      description: |
        Returns the full list of `campaign_creators` rows for the campaign
        ordered by created_at ASC, id ASC. No pagination is applied — the
        admin UI shows the whole roster. Soft-deleted campaigns surface as
        404 (see add endpoint description).
      tags: [campaigns]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Creators list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCampaignCreatorsResult"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Campaign not found (missing or soft-deleted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /campaigns/{id}/creators/{creatorId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: creatorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      operationId: removeCampaignCreator
      summary: Remove a creator from a campaign (admin-only)
      description: |
        Hard-deletes the `campaign_creators` row for the given (campaignId,
        creatorId) pair. Forbidden once the creator agreed (status=agreed)
        — the row remains for the downstream TrustMe flow (out of scope).
        Soft-deleted campaigns surface as 404 (see add endpoint description).
        The success response is intentionally empty (204 No Content).
      tags: [campaigns]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Creator removed.
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Campaign not found, or creator not attached to this campaign.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: The creator already agreed and cannot be removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /campaigns/{id}/notify:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: notifyCampaignCreators
      summary: Send invitation messages to campaign creators (admin-only)
      description: |
        Sends a Telegram invitation message with an inline `web_app` button to
        every creator in the batch. Allowed source statuses are `planned` and
        `declined` — the latter resets `reminded_count`/`reminded_at`/
        `decided_at` so the next decision cycle starts clean. The endpoint
        validates the whole batch atomically before sending: any creator that
        is not attached to this campaign or sits in an incompatible status
        (`invited` / `agreed`) fails the request with 422
        CAMPAIGN_CREATOR_BATCH_INVALID — no message is sent and the database
        is untouched. After validation, delivery runs per-creator with
        partial-success semantics: creators that fail to receive the message
        (e.g. blocked the bot) come back in the `undelivered` list and their
        row keeps the previous status / counters / audit; delivered creators
        flip to `invited` with the counter and audit row written in the same
        per-creator transaction.

        Soft-deleted campaigns surface as 404. Non-admin callers receive 403.
      tags: [campaigns]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignCreatorBatchInput"
      responses:
        "200":
          description: Notification batch processed (with possible partial undelivered).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignNotifyResult"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Campaign not found (missing or soft-deleted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            Shape/format violation (empty array, > 200 ids, duplicate ids), or
            CONTRACT_TEMPLATE_REQUIRED if the campaign has no contract template
            uploaded yet, or CAMPAIGN_CREATOR_BATCH_INVALID with `details`
            listing every unattached / wrong-status creator from the batch.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CampaignCreatorBatchInvalidErrorResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /campaigns/{id}/remind-invitation:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: remindCampaignCreatorsInvitation
      summary: Send invitation reminders to campaign creators (admin-only)
      description: |
        Symmetric to `POST /campaigns/{id}/notify` but for creators already in
        status `invited`. The status does not change — only `reminded_count`
        and `reminded_at` advance on delivery. Validation, partial-success and
        error semantics match the notify endpoint exactly; the only
        difference is the allowed source status (`invited`).
      tags: [campaigns]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignCreatorBatchInput"
      responses:
        "200":
          description: Reminder batch processed (with possible partial undelivered).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignNotifyResult"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Campaign not found (missing or soft-deleted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            Either a shape/format violation (empty array, > 200 ids, duplicate
            ids) returned as the standard ErrorResponse, or
            CAMPAIGN_CREATOR_BATCH_INVALID with `details` listing every
            unattached / wrong-status creator from the batch.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CampaignCreatorBatchInvalidErrorResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /campaigns/{id}/contract-template:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: uploadCampaignContractTemplate
      summary: Upload the contract-template PDF for a campaign (admin-only)
      description: |
        Stores the raw PDF bytes in `campaigns.contract_template_pdf`,
        replacing any previously uploaded template. The body is the PDF
        itself, not a multipart form — keeps the wire format simple and
        avoids buffering through middleware that does not understand
        multipart streaming.

        Validation runs in fixed order; the first failure short-circuits:
        empty body → CONTRACT_REQUIRED, unparseable PDF →
        CONTRACT_INVALID_PDF, any of the three known placeholders missing
        → CONTRACT_MISSING_PLACEHOLDER (with `details.missing`), any
        unknown placeholder name → CONTRACT_UNKNOWN_PLACEHOLDER (with
        `details.unknown`).

        The known set is `CreatorFIO`, `CreatorIIN`, `IssuedDate` —
        `domain.KnownContractPlaceholders` is the single source of truth
        and the chunk-16 outbox `Render` step relies on the same list.

        Audit row `campaign.contract_template_uploaded` is written in the
        same transaction as the column UPDATE. The reply echoes the
        sha256 hash of the uploaded bytes plus the placeholder set so the
        UI can render a confirmation block without re-downloading.
      tags: [campaigns]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: |
          Raw PDF bytes of the contract template. Maximum size is bounded
          by the global request-body limit configured on the backend.
        content:
          application/pdf:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Template stored; reply contains the hash and the placeholders.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadCampaignContractTemplateResult"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Campaign not found (missing or soft-deleted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            Validation failed. CONTRACT_REQUIRED / CONTRACT_INVALID_PDF
            carry no `details`; CONTRACT_MISSING_PLACEHOLDER carries
            `details.missing`; CONTRACT_UNKNOWN_PLACEHOLDER carries
            `details.unknown`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractValidationErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"
    get:
      operationId: getCampaignContractTemplate
      summary: Download the contract-template PDF for a campaign (admin-only)
      description: |
        Returns the raw PDF previously stored via PUT. Soft-deleted
        campaigns are treated as not found (404 CAMPAIGN_NOT_FOUND), like
        the other campaign-domain admin endpoints. A live campaign with
        an empty `contract_template_pdf` answers 404
        CONTRACT_TEMPLATE_NOT_FOUND so the admin UI can distinguish
        "campaign exists but no template" from "campaign gone".
      tags: [campaigns]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stored PDF contents.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: |
            Either the campaign itself is missing or soft-deleted
            (`CAMPAIGN_NOT_FOUND`), or the campaign exists but no template
            has been uploaded yet (`CONTRACT_TEMPLATE_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /tma/campaigns/{secretToken}/agree:
    post:
      operationId: tmaAgree
      summary: Creator agrees to participate in a campaign (TMA-only)
      description: |
        Creator-side decision endpoint. The `secretToken` path-param is the
        last path-segment of the campaign's tma_url; the regex format
        (`^[A-Za-z0-9_-]{16,}$`) is enforced both in handler-side
        early-reject and in domain validation on POST/PATCH /campaigns,
        plus a partial UNIQUE index in the DB. Authentication is via
        `Authorization: tma <init-data>` header; the middleware verifies
        the Telegram WebApp HMAC and resolves the creator. Body is empty.

        Idempotency: a repeated agree from `agreed` (or decline from
        `declined`) returns 200 + `alreadyDecided=true` without writing
        UPDATE or audit. Other transitions surface granular 422s.
      tags: [tma]
      security:
        - tmaInitData: []
      parameters:
        - $ref: "#/components/parameters/TmaSecretTokenPathParam"
      responses:
        "200":
          description: Decision applied (or already in this state — see `alreadyDecided`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TmaDecisionResult"
        "401":
          description: TMA initData header missing / invalid / expired. Generic anti-fingerprint body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Creator not registered or not invited to this campaign. Anti-fingerprint single body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Campaign not found by secret_token (or soft-deleted, or token format mismatch).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Granular state-machine error (planned / declined / etc).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /tma/campaigns/{secretToken}/decline:
    post:
      operationId: tmaDecline
      summary: Creator declines to participate in a campaign (TMA-only)
      description: |
        Symmetric counterpart to `tmaAgree`. Same authn / authz / state-machine
        rules; flips the row to `declined` and records a
        `campaign_creator_decline` audit event in the same tx.
      tags: [tma]
      security:
        - tmaInitData: []
      parameters:
        - $ref: "#/components/parameters/TmaSecretTokenPathParam"
      responses:
        "200":
          description: Decision applied (or already in this state — see `alreadyDecided`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TmaDecisionResult"
        "401":
          description: TMA initData header missing / invalid / expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Creator not registered or not invited.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Campaign not found / soft-deleted / token format mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Granular state-machine error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /webhooks/sendpulse/instagram:
    post:
      operationId: sendPulseInstagramWebhook
      summary: SendPulse webhook for Instagram DM verification
      description: |
        SendPulse-driven Instagram DM verification. Bearer-gated by the
        SendPulse middleware. Always returns 200 `{}` past the bearer (incl.
        no-op outcomes) and 401 `{}` before — anti-fingerprinting.
      tags: [webhooks]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendPulseInstagramWebhookRequest"
      responses:
        "200":
          description: Webhook processed (always — including no-op cases).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendPulseInstagramWebhookResult"
        "401":
          description: Wrong or missing bearer secret. Body is empty — no fingerprinting.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendPulseInstagramWebhookResult"
        default:
          $ref: "#/components/responses/UnexpectedError"

  /trustme/webhook:
    post:
      operationId: trustMeWebhook
      summary: TrustMe document status webhook
      description: |
        Receives TrustMe document state-change notifications. Auth via static
        token in `Authorization: Bearer <token>` header — формат настраивается
        в кабинете TrustMe при создании вебхука (blueprint § «Установка хуков»
        упоминает raw token, реальный кабинет шлёт Bearer-prefixed). Middleware
        compares constant-time и пишет 401 `{}` напрямую без фингерпринта
        между missing/wrong. Idempotent повтор того же события возвращает
        200 без побочных эффектов; terminal-guard (`signed`/`signing_declined`)
        защищает от reorder'а.
      tags: [webhooks]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrustMeWebhookRequest"
      responses:
        "200":
          description: Webhook processed (включая idempotent / terminal-guard no-op).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResult"
        "401":
          description: Missing or wrong Authorization token (anti-fingerprint, body пустой).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResult"
        "404":
          description: Unknown contract_id in payload — нет ряда с таким trustme_document_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Status вне 0..9 либо subject_kind не поддержан dispatcher'ом.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedError"

components:
  parameters:
    PageQueryParam:
      name: page
      in: query
      description: 1-based page index.
      schema:
        type: integer
        minimum: 1
    PerPageQueryParam:
      name: perPage
      in: query
      description: Page size, between 1 and 200 inclusive.
      schema:
        type: integer
        minimum: 1
        maximum: 200
    TmaSecretTokenPathParam:
      name: secretToken
      in: path
      required: true
      description: |
        URL-safe secret token — last path segment of the campaign's tma_url.
        Format `^[A-Za-z0-9_-]{16,256}$`. Strict regex match in the handler
        rejects malformed tokens with 404 before any DB lookup.
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{16,256}$'

  responses:
    UnexpectedError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: dev

    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. CREATOR_NOT_FOUND)
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable fallback message (English)
          example: Invalid input

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/APIError"

    MessageData:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Operation successful

    MessageResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/MessageData"

    UserRole:
      type: string
      description: |
        Role of an authenticated user. `creator` is set by the TMA initData
        middleware after a successful HMAC + creator-by-telegram-user-id
        lookup; admin / brand_manager come from the JWT auth flow.
      enum: [admin, brand_manager, creator]

    ConsentType:
      type: string
      description: Canonical consent type captured at creator application submission.
      enum: [processing, third_party, cross_border, terms]

    CreatorApplicationStatus:
      type: string
      description: |
        Lifecycle status of a creator application. Values follow the state
        machine described in `_bmad-output/planning-artifacts/creator-application-state-machine.md`.
      enum: [verification, moderation, approved, rejected, withdrawn]

    PaginationInput:
      type: object
      description: Shared 1-based pagination payload for body-paginated list endpoints.
      required: [page, perPage]
      properties:
        page:
          type: integer
          minimum: 1
          description: 1-based page index.
        perPage:
          type: integer
          minimum: 1
          maximum: 200
          description: Page size, between 1 and 200 inclusive.

    DictionaryItem:
      type: object
      description: |
        Single entry from a public dictionary (categories, cities, etc.).
        Reused for the dictionary-listing endpoint and for hydrated dictionary
        references on creator-application reads, where the backend falls back
        to `(code, code, 0)` when the underlying dictionary row has been
        deactivated.
      required: [code, name, sortOrder]
      properties:
        code:
          type: string
          description: Stable machine-readable identifier (snake_case).
        name:
          type: string
          description: Human-readable label rendered to the user.
        sortOrder:
          type: integer
          description: Sort key — lower values appear first in the UI.

    DictionaryListResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ListDictionaryData"

    ListDictionaryData:
      type: object
      required: [type, items]
      properties:
        type:
          type: string
          description: Dictionary type echoed back to the client.
        items:
          type: array
          items:
            $ref: "#/components/schemas/DictionaryItem"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@ugcboost.kz
        password:
          type: string
          minLength: 6
          example: "password123"

    LoginData:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    LoginResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/LoginData"

    PasswordResetRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetBody:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 6

    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"

    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/User"

    BrandInput:
      type: object
      description: Mutable subset of a brand — used for create and update.
      required: [name]
      properties:
        name:
          type: string
        logoUrl:
          type: string

    Brand:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BrandResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Brand"

    BrandListItem:
      type: object
      required: [id, name, managerCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
        managerCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListBrandsData:
      type: object
      required: [brands]
      properties:
        brands:
          type: array
          items:
            $ref: "#/components/schemas/BrandListItem"

    ListBrandsResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ListBrandsData"

    ManagerInfo:
      type: object
      required: [userId, email, assignedAt]
      properties:
        userId:
          type: string
        email:
          type: string
        assignedAt:
          type: string
          format: date-time

    BrandDetailData:
      type: object
      required: [id, name, createdAt, updatedAt, managers]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        managers:
          type: array
          items:
            $ref: "#/components/schemas/ManagerInfo"

    GetBrandResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/BrandDetailData"

    AssignManagerRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string

    AssignManagerData:
      type: object
      required: [userId, email, role]
      properties:
        userId:
          type: string
        email:
          type: string
        role:
          type: string
        tempPassword:
          type: string

    AssignManagerResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AssignManagerData"

    AuditLogEntry:
      type: object
      required: [id, actorRole, action, entityType, ipAddress, createdAt]
      properties:
        id:
          type: string
        actorId:
          type: string
          nullable: true
          description: Null for system / public actions (e.g. public creator application submit).
        actorRole:
          type: string
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        oldValue: {}
        newValue: {}
        ipAddress:
          type: string
        createdAt:
          type: string
          format: date-time

    ListAuditLogsData:
      type: object
      required: [logs, total, page, perPage]
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        total:
          type: integer
          format: int64
        page:
          type: integer
        perPage:
          type: integer

    AuditLogsResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ListAuditLogsData"

    SocialPlatform:
      type: string
      description: Supported social network for creator accounts (MVP scope).
      enum: [instagram, tiktok, threads]

    SocialVerificationMethod:
      type: string
      description: |
        How a social account was verified. `auto` — webhook from SendPulse caught
        the verification code in an Instagram DM. `manual` — admin marked the
        social as verified from the application drawer.
      enum: [auto, manual]

    SocialAccountInput:
      type: object
      required: [platform, handle]
      properties:
        platform:
          $ref: "#/components/schemas/SocialPlatform"
        handle:
          type: string
          description: Account handle or public identifier on the given platform.
          minLength: 1
          maxLength: 128

    CreatorApplicationSubmitRequest:
      type: object
      required:
        - lastName
        - firstName
        - iin
        - phone
        - city
        - categories
        - socials
        - acceptedAll
      properties:
        lastName:
          type: string
          minLength: 1
          maxLength: 128
        firstName:
          type: string
          minLength: 1
          maxLength: 128
        middleName:
          type: string
          maxLength: 128
          description: Optional patronymic (not every applicant has one).
        iin:
          type: string
          description: Kazakhstani individual identification number (12 digits).
          pattern: "^[0-9]{12}$"
        phone:
          type: string
          minLength: 1
          maxLength: 32
        city:
          type: string
          minLength: 1
          maxLength: 128
        address:
          type: string
          nullable: true
          maxLength: 512
          description: |
            Optional legal/postal address. Empty on the landing form (the bot
            collects it later); admins may patch it via moderation tooling.
        categories:
          type: array
          description: |
            One or more category codes from the categories catalogue. Must be non-empty.
            Maximum three codes; submissions with more are rejected with 422.
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 64
        categoryOtherText:
          type: string
          nullable: true
          maxLength: 200
          description: |
            Free-text description of the creator's niche when "other" appears in
            categories. Required when "other" is present (otherwise the request is
            rejected with 422 VALIDATION_ERROR). Ignored when "other" is absent.
        socials:
          type: array
          description: One or more social accounts. Multiple handles on the same platform are allowed.
          minItems: 1
          items:
            $ref: "#/components/schemas/SocialAccountInput"
        acceptedAll:
          type: boolean
          description: |
            Single consent flag covering all four canonical consent types
            (processing / third_party / cross_border / terms). The legal model
            (privacy-policy.md §9.2) treats acceptance of the Privacy Policy as
            unconditional consent to all four. Backend writes four rows in
            creator_application_consents bound to the current document versions.
            Must be true; otherwise the request is rejected with 422 MISSING_CONSENT.

    CreatorApplicationSubmitData:
      type: object
      required: [applicationId, telegramBotUrl]
      properties:
        applicationId:
          type: string
          format: uuid
          description: UUID of the newly created application (also embedded into the bot deep-link).
        telegramBotUrl:
          type: string
          format: uri
          description: Deep-link to the Telegram bot carrying application id as start parameter.

    CreatorApplicationSubmitResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApplicationSubmitData"

    CreatorApplicationDetailSocial:
      type: object
      required: [id, platform, handle, verified]
      properties:
        id:
          type: string
          format: uuid
          description: |
            Stable identifier for the social row. Required by the admin
            manual-verify action (POST /creators/applications/{id}/socials/{socialId}/verify).
        platform:
          $ref: "#/components/schemas/SocialPlatform"
        handle:
          type: string
        verified:
          type: boolean
          description: Whether the creator's ownership of this social account has been confirmed.
        method:
          $ref: "#/components/schemas/SocialVerificationMethod"
          nullable: true
          description: Path used to verify ownership; null while the account is unverified.
        verifiedByUserId:
          type: string
          format: uuid
          nullable: true
          description: Admin who pressed the manual-verify button. Null on auto and on unverified rows.
        verifiedAt:
          type: string
          format: date-time
          nullable: true
          description: When verification succeeded; null while the account is unverified.

    CreatorApplicationDetailConsent:
      type: object
      required: [consentType, acceptedAt, documentVersion, ipAddress, userAgent]
      properties:
        consentType:
          $ref: "#/components/schemas/ConsentType"
        acceptedAt:
          type: string
          format: date-time
        documentVersion:
          type: string
          description: Document version stamp recorded at the moment of consent.
        ipAddress:
          type: string
          description: Client IP recorded at submission (raw stored as-is).
        userAgent:
          type: string
          description: Truncated User-Agent recorded at submission.

    TelegramLink:
      type: object
      description: Telegram account linked to a creator application via /start deep-link.
      required: [telegramUserId, linkedAt]
      properties:
        telegramUserId:
          type: integer
          format: int64
          description: Telegram numeric user id (BIGINT) — stable identifier of the linked account.
        telegramUsername:
          type: string
          nullable: true
          description: Telegram @username at link time (no leading @). Nullable.
        telegramFirstName:
          type: string
          nullable: true
          description: Telegram first_name at link time. Nullable.
        telegramLastName:
          type: string
          nullable: true
          description: Telegram last_name at link time. Nullable.
        linkedAt:
          type: string
          format: date-time
          description: Timestamp of the successful link.

    CreatorApplicationDetailData:
      type: object
      required:
        - id
        - lastName
        - firstName
        - iin
        - birthDate
        - phone
        - city
        - status
        - verificationCode
        - createdAt
        - updatedAt
        - categories
        - socials
        - consents
        - telegramBotUrl
      properties:
        id:
          type: string
          format: uuid
        verificationCode:
          type: string
          description: |
            6-digit `UGC-NNNNNN` code the creator must DM to the official
            Instagram for auto-verification. Visible only via this admin
            endpoint — never returned by public/landing routes.
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        iin:
          type: string
          description: Kazakhstani individual identification number (12 digits).
        birthDate:
          type: string
          format: date
          description: Birth date derived from the IIN at submission time.
        phone:
          type: string
        city:
          $ref: "#/components/schemas/DictionaryItem"
        address:
          type: string
          nullable: true
        categoryOtherText:
          type: string
          nullable: true
          description: Free-text niche description when categories include "other".
        status:
          $ref: "#/components/schemas/CreatorApplicationStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        categories:
          type: array
          description: Categories selected by the creator, sorted by sort_order then code.
          items:
            $ref: "#/components/schemas/DictionaryItem"
        socials:
          type: array
          description: Social accounts attached to the application, sorted by platform then handle.
          items:
            $ref: "#/components/schemas/CreatorApplicationDetailSocial"
        consents:
          type: array
          description: |
            Consents in canonical order (processing → third_party → cross_border → terms),
            independent of the order they appear in the database.
          items:
            $ref: "#/components/schemas/CreatorApplicationDetailConsent"
        telegramLink:
          allOf:
            - $ref: "#/components/schemas/TelegramLink"
          nullable: true
          description: |
            Telegram account linked to this application. Null when the creator
            has not yet opened the bot.
        telegramBotUrl:
          type: string
          description: |
            Deep-link in form `https://t.me/{bot}?start={applicationId}`. The
            admin shares it with the creator (e.g. via WhatsApp) when
            `telegramLink` is null. Always returned regardless of link state so
            the response shape stays stable; the frontend renders the copy
            action only when not yet bound.
        rejection:
          allOf:
            - $ref: "#/components/schemas/CreatorApplicationRejection"
          nullable: true
          description: |
            Present only when `status` is `rejected`. Mirrors the
            `verifiedByUserId` / `verifiedAt` shape used on socials: it carries
            who took the action, when, and which status it transitioned from.
            The rejected application's other fields (telegramLink, socials,
            consents) stay populated so downstream flows (chunk 14 notifier,
            future broadcasts) can still reach the creator.

    CreatorApplicationRejection:
      type: object
      description: |
        Reject metadata derived from the latest
        `creator_application_status_transitions` row with `to_status=rejected`.
      required: [fromStatus, rejectedAt, rejectedByUserId]
      properties:
        fromStatus:
          $ref: "#/components/schemas/CreatorApplicationStatus"
        rejectedAt:
          type: string
          format: date-time
        rejectedByUserId:
          type: string
          format: uuid

    GetCreatorApplicationResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApplicationDetailData"

    CreatorApplicationListSortField:
      type: string
      description: |
        Sort field for the admin list. Mapped to a SQL column / expression on
        the backend. Unknown values are rejected with 422.
      enum: [created_at, updated_at, full_name, birth_date, city_name]

    SortOrder:
      type: string
      description: Sort direction.
      enum: [asc, desc]

    CreatorApplicationsListRequest:
      description: |
        Filter, search, sort and pagination payload for the admin list. All
        filter fields are optional and combined with AND between fields, OR
        (any-of) within a single array. Empty/whitespace `search` is ignored.
      allOf:
        - $ref: "#/components/schemas/PaginationInput"
        - type: object
          required: [sort, order]
          properties:
            statuses:
              type: array
              description: Match any of these statuses. Empty/missing → all statuses.
              items:
                $ref: "#/components/schemas/CreatorApplicationStatus"
            cities:
              type: array
              description: Match any of these city codes (from the cities dictionary).
              items:
                type: string
                minLength: 1
                maxLength: 64
            categories:
              type: array
              description: Match applications that include any of these category codes.
              items:
                type: string
                minLength: 1
                maxLength: 64
            dateFrom:
              type: string
              format: date-time
              description: Inclusive lower bound for `created_at`.
            dateTo:
              type: string
              format: date-time
              description: Inclusive upper bound for `created_at`.
            ageFrom:
              type: integer
              minimum: 0
              maximum: 120
              description: Inclusive lower bound for the creator's age in full years (computed from birth_date).
            ageTo:
              type: integer
              minimum: 0
              maximum: 120
              description: Inclusive upper bound for the creator's age in full years.
            telegramLinked:
              type: boolean
              description: |
                When true, only applications already bound to a Telegram account
                are returned. When false, only those still without a link.
                Missing/null disables the filter.
            search:
              type: string
              maxLength: 128
              description: |
                Free-text search across last_name, first_name, middle_name, IIN
                (case-insensitive) and social-account handles. Trimmed; empty/blank
                after trim disables the filter. Carries PII — the endpoint is POST
                so this never lands in URL params.
            sort:
              $ref: "#/components/schemas/CreatorApplicationListSortField"
            order:
              $ref: "#/components/schemas/SortOrder"

    CreatorApplicationListItem:
      type: object
      required:
        - id
        - status
        - lastName
        - firstName
        - birthDate
        - city
        - categories
        - socials
        - telegramLinked
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/CreatorApplicationStatus"
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
        city:
          $ref: "#/components/schemas/DictionaryItem"
        categories:
          type: array
          description: Categories selected by the creator, sorted by sort_order then code.
          items:
            $ref: "#/components/schemas/DictionaryItem"
        socials:
          type: array
          description: Social accounts attached to the application, sorted by platform then handle.
          items:
            $ref: "#/components/schemas/CreatorApplicationDetailSocial"
        telegramLinked:
          type: boolean
          description: True when the creator has bound a Telegram account via /start.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatorApplicationsListData:
      type: object
      required: [items, total, page, perPage]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreatorApplicationListItem"
        total:
          type: integer
          format: int64
          description: Total number of matching applications across all pages.
        page:
          type: integer
        perPage:
          type: integer

    CreatorApplicationsListResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApplicationsListData"

    CreatorApplicationStatusCount:
      type: object
      description: Single (status, count) pair returned by GET /creators/applications/counts.
      required: [status, count]
      properties:
        status:
          $ref: "#/components/schemas/CreatorApplicationStatus"
        count:
          type: integer
          format: int64
          minimum: 0
          description: Number of creator applications currently in this status.

    CreatorApplicationsCountsData:
      type: object
      description: |
        Sparse counts payload — see the operation description on the
        `getCreatorApplicationsCounts` endpoint for the contract details.
        `items` is alphabetically sorted by `status` for deterministic output.
      required: [items]
      properties:
        items:
          type: array
          description: Sparse list — only statuses with at least one application appear here.
          items:
            $ref: "#/components/schemas/CreatorApplicationStatusCount"

    CreatorApplicationsCountsResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApplicationsCountsData"

    SendPulseInstagramWebhookRequest:
      type: object
      description: |
        Custom JSON payload SendPulse delivers from the Instagram chatbot.
        `username` and `lastMessage` come from the configured "send custom
        data" action; `contactId` is SendPulse's opaque contact identifier
        kept for trace correlation.
      required: [username, lastMessage]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 256
          description: Instagram handle of the message sender as SendPulse received it.
        lastMessage:
          type: string
          minLength: 1
          maxLength: 4096
          description: Body of the last message in the IG DM thread.
        contactId:
          type: string
          maxLength: 256
          description: Optional SendPulse contact id; opaque to backend, kept for correlation.

    SendPulseInstagramWebhookResult:
      type: object
      description: |
        Empty object — the SendPulse webhook never carries data back. Both
        success (200) and the constant-time auth failure (401) emit the
        same `{}` body.

    TrustMeWebhookRequest:
      type: object
      description: |
        TrustMe document state-change payload. Wire-format поля повторяют
        формат из blueprint § «Содержимое хука» (`contract_id`, `status`,
        `client`, `contract_url`); реальный смысл указан в `description`
        каждого поля.
      required: [contract_id, status]
      properties:
        contract_id:
          type: string
          minLength: 1
          maxLength: 256
          description: |
            TrustMe-side document identifier. У TrustMe непоследовательный
            нейминг — `document_id` в response отправки, `id` в /search,
            `contract_id` здесь. У нас в БД это `contracts.trustme_document_id`.
        status:
          type: integer
          minimum: 0
          maximum: 9
          description: |
            TrustMe document status code per blueprint § «Получить статус
            документа». 3 = подписан, 9 = отказ креатора, остальные —
            intermediate / unexpected.
        client:
          type: string
          maxLength: 256
          description: |
            Phone of the actor that triggered the change. Игнорируем —
            PII, в БД и логи не пишем (security.md).
        contract_url:
          type: string
          maxLength: 1024
          description: |
            Full URL to the document. Игнорируем — детерминирован от
            `contract_id`, уже записан в `trustme_short_url` после Phase 3.

    EmptyResult:
      type: object
      description: |
        Generic empty success envelope for endpoints that do not carry a
        payload back. Clients should refetch the relevant resource to
        observe state changes.

    CreatorApprovalData:
      type: object
      description: Payload returned by POST /creators/applications/{id}/approve.
      required: [creatorId]
      properties:
        creatorId:
          type: string
          format: uuid
          description: ID of the creator row created by the approve action.

    CreatorApprovalInput:
      type: object
      description: |
        Optional body for POST /creators/applications/{id}/approve. When
        omitted (or both fields omitted) the endpoint behaves exactly like
        before — only the application is approved. When `campaignIds` is
        present and non-empty, the freshly-created creator is also added to
        the listed campaigns (`planned` status) sequentially after the
        approve transaction commits.
      properties:
        campaignIds:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 20
          description: |
            Optional UUIDs of campaigns to attach the new creator to. Empty
            array, `null` or omitted field all mean "approve only — do not
            attach".

    CreatorApprovalResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApprovalData"

    CreatorAggregateSocial:
      type: object
      description: |
        Snapshot of one social account attached to a creator at the moment of
        approve. The verification fields are copied from the application's
        social row 1:1 — they reflect the verification state at approval time
        even if the dictionary or the originating application later changes.
      required: [id, platform, handle, verified, createdAt]
      properties:
        id:
          type: string
          format: uuid
        platform:
          $ref: "#/components/schemas/SocialPlatform"
        handle:
          type: string
        verified:
          type: boolean
          description: Whether ownership of this social account was confirmed at approval time.
        method:
          $ref: "#/components/schemas/SocialVerificationMethod"
          nullable: true
          description: Verification path; null on rows whose original verification was unverified.
        verifiedByUserId:
          type: string
          format: uuid
          nullable: true
          description: Admin who pressed manual-verify; null on auto-verified and unverified rows.
        verifiedAt:
          type: string
          format: date-time
          nullable: true
          description: When verification succeeded; null when the row stays unverified.
        createdAt:
          type: string
          format: date-time
          description: When the snapshot row was inserted into creator_socials.

    CreatorAggregateCategory:
      type: object
      description: |
        One category linked to a creator. `code` is the stable machine
        identifier copied from the application; `name` is hydrated from the
        active categories dictionary at read time, with a fallback to `code`
        when the dictionary entry has been deactivated.
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string

    CreatorAggregate:
      type: object
      description: |
        Full creator profile assembled from `creators` plus the snapshot tables
        `creator_socials` and `creator_categories`. The Telegram block is
        flattened (no separate object) because the only path to materialise a
        creator is via approve, which guarantees a Telegram link existed at
        that moment. City and category codes are returned alongside their
        localised names hydrated from the active public dictionaries; missing
        dictionary entries degrade to a `name == code` fallback.
      required:
        - id
        - iin
        - sourceApplicationId
        - lastName
        - firstName
        - birthDate
        - phone
        - cityCode
        - cityName
        - telegramUserId
        - socials
        - categories
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        iin:
          type: string
          description: Kazakhstani individual identification number (12 digits).
        sourceApplicationId:
          type: string
          format: uuid
          description: ID of the originating creator application; allows admin and analytics joins.
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
        phone:
          type: string
        cityCode:
          type: string
          description: Stable city code copied from the originating application.
        cityName:
          type: string
          description: Localised city label hydrated from the active cities dictionary; falls back to `cityCode` when the entry has been deactivated.
        address:
          type: string
          nullable: true
        categoryOtherText:
          type: string
          nullable: true
          description: Free-text niche description; non-null only when categories include "other".
        telegramUserId:
          type: integer
          format: int64
          description: Telegram numeric user id (BIGINT) — stable identifier of the linked account.
        telegramUsername:
          type: string
          nullable: true
        telegramFirstName:
          type: string
          nullable: true
        telegramLastName:
          type: string
          nullable: true
        socials:
          type: array
          description: Social accounts sorted by (platform, handle).
          items:
            $ref: "#/components/schemas/CreatorAggregateSocial"
        categories:
          type: array
          description: Categories sorted by code.
          items:
            $ref: "#/components/schemas/CreatorAggregateCategory"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GetCreatorResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorAggregate"

    CreatorListSortField:
      type: string
      description: |
        Sort field for the admin creator list. Mapped to a SQL column /
        expression on the backend. Unknown values are rejected with 422.
      enum: [created_at, updated_at, full_name, birth_date, city_name]

    CreatorsListRequest:
      description: |
        Filter, search, sort and pagination payload for the admin creator
        list. All filter fields are optional and combined with AND between
        fields, OR (any-of) within a single array. Empty/whitespace `search`
        is ignored.
      allOf:
        - $ref: "#/components/schemas/PaginationInput"
        - type: object
          required: [sort, order]
          properties:
            ids:
              type: array
              maxItems: 200
              description: |
                Match only creators whose id is in this list. Combined with
                other filters via AND. Empty array — filter disabled (NO-OP).
                Backed by an admin-curated lookup, e.g. hydrating profile rows
                for the campaign_creators many-to-many returned by
                `GET /campaigns/{id}/creators`. Over-sized arrays return 422
                VALIDATION_ERROR; nil/duplicate elements are normalised away.
              items:
                type: string
                format: uuid
            cities:
              type: array
              description: Match any of these city codes (from the cities dictionary).
              items:
                type: string
                minLength: 1
                maxLength: 64
            categories:
              type: array
              description: Match creators that include any of these category codes.
              items:
                type: string
                minLength: 1
                maxLength: 64
            dateFrom:
              type: string
              format: date-time
              description: Inclusive lower bound for `created_at` (creator's approve moment).
            dateTo:
              type: string
              format: date-time
              description: Inclusive upper bound for `created_at`.
            ageFrom:
              type: integer
              minimum: 0
              maximum: 120
              description: Inclusive lower bound for the creator's age in full years (computed from birth_date).
            ageTo:
              type: integer
              minimum: 0
              maximum: 120
              description: Inclusive upper bound for the creator's age in full years.
            search:
              type: string
              maxLength: 128
              description: |
                Free-text search across last_name, first_name, middle_name, IIN,
                phone, telegram_username (case-insensitive) and social-account
                handles. Trimmed; empty/blank after trim disables the filter.
                Carries PII — the endpoint is POST so this never lands in URL
                params.
            sort:
              $ref: "#/components/schemas/CreatorListSortField"
            order:
              $ref: "#/components/schemas/SortOrder"

    CreatorListSocial:
      type: object
      description: |
        Lean social-account row returned in the creator list. Only the
        platform/handle pair is surfaced — verification metadata, ids and
        timestamps stay in the full GET aggregate.
      required: [platform, handle]
      properties:
        platform:
          $ref: "#/components/schemas/SocialPlatform"
        handle:
          type: string

    CreatorListItem:
      type: object
      description: |
        One row in the admin creator list. Includes identity, contact details
        searchable from the admin UI (phone, telegram_username) and the
        dictionary-hydrated city/categories. Address, category_other_text and
        the full Telegram metadata are reserved for `GET /creators/{id}`.
      required:
        - id
        - lastName
        - firstName
        - iin
        - birthDate
        - phone
        - city
        - categories
        - socials
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        iin:
          type: string
          description: Kazakhstani individual identification number (12 digits).
        birthDate:
          type: string
          format: date
        phone:
          type: string
        city:
          $ref: "#/components/schemas/DictionaryItem"
        categories:
          type: array
          description: Categories selected by the creator, sorted by sort_order then code.
          items:
            $ref: "#/components/schemas/DictionaryItem"
        socials:
          type: array
          description: Social accounts attached to the creator, sorted by platform then handle.
          items:
            $ref: "#/components/schemas/CreatorListSocial"
        telegramUsername:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatorsListData:
      type: object
      required: [items, total, page, perPage]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreatorListItem"
        total:
          type: integer
          format: int64
          description: Total number of matching creators across all pages.
        page:
          type: integer
        perPage:
          type: integer

    CreatorsListResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorsListData"

    CampaignInput:
      type: object
      description: Mutable subset of a campaign — used for create.
      required: [name, tmaUrl]
      properties:
        name:
          type: string
          description: Display name of the campaign. Unique among non-deleted campaigns.
        tmaUrl:
          type: string
          description: URL of the TMA-side ТЗ landing page embedded into creator invites.

    CampaignCreatedData:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
          description: Server-stamped UUID of the freshly created campaign.

    CampaignCreatedResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CampaignCreatedData"

    Campaign:
      type: object
      description: |
        Full marketing campaign as returned by GET /campaigns/{id}. The shape
        is shared by upcoming list / patch responses — they reuse this schema
        instead of inlining a copy.
      required: [id, name, tmaUrl, isDeleted, hasContractTemplate, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          description: Server-stamped UUID of the campaign.
        name:
          type: string
          description: Display name of the campaign. Unique among non-deleted campaigns.
        tmaUrl:
          type: string
          description: URL of the TMA-side ТЗ landing page embedded into creator invites.
        isDeleted:
          type: boolean
          description: Soft-delete flag — true means the campaign was removed but is still readable for audit.
        hasContractTemplate:
          type: boolean
          description: |
            Whether a contract-template PDF has been uploaded for this campaign.
            Computed on the fly from `octet_length(contract_template_pdf) > 0`
            so list endpoints stay light — the PDF body itself is only
            available via GET /campaigns/{id}/contract-template.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GetCampaignResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Campaign"

    UploadCampaignContractTemplateData:
      type: object
      description: |
        Result of a successful PUT /campaigns/{id}/contract-template upload.
        Echoes the placeholders extracted from the freshly stored PDF so the
        admin UI can render a confirmation block ("found CreatorFIO,
        CreatorIIN, IssuedDate") without a follow-up download.
      required: [hash, placeholders]
      properties:
        hash:
          type: string
          description: SHA-256 hash of the raw uploaded PDF bytes (lowercase hex).
        placeholders:
          type: array
          description: |
            Distinct placeholder names found in the template. After successful
            validation this set always equals the known set
            (`CreatorFIO`, `CreatorIIN`, `IssuedDate`) — order matches
            `domain.KnownContractPlaceholders`.
          items:
            type: string

    UploadCampaignContractTemplateResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/UploadCampaignContractTemplateData"

    ContractValidationDetails:
      type: object
      description: |
        Optional structured details for contract-template upload validation
        errors. `missing` lists known placeholders absent from the uploaded
        PDF. `unknown` lists placeholders found in the PDF that are not part
        of `domain.KnownContractPlaceholders`. Empty for the empty-body /
        invalid-PDF cases — the code alone identifies them.
      properties:
        missing:
          type: array
          items:
            type: string
        unknown:
          type: array
          items:
            type: string

    ContractValidationErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: |
            One of CONTRACT_REQUIRED / CONTRACT_INVALID_PDF /
            CONTRACT_MISSING_PLACEHOLDER / CONTRACT_UNKNOWN_PLACEHOLDER.
        message:
          type: string
          description: Human-readable fallback message for the admin UI.
        details:
          $ref: "#/components/schemas/ContractValidationDetails"

    ContractValidationErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ContractValidationErrorBody"

    CampaignListSortField:
      type: string
      description: |
        Sort field for the admin list. Mapped to a SQL column on the backend.
        Unknown values are rejected with 422.
      enum: [created_at, updated_at, name]

    CampaignsListData:
      type: object
      required: [items, total, page, perPage]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Campaign"
        total:
          type: integer
          format: int64
          description: Total number of matching campaigns across all pages.
        page:
          type: integer
        perPage:
          type: integer

    CampaignsListResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CampaignsListData"

    CampaignCreatorStatus:
      type: string
      description: |
        Lifecycle state of a creator within a campaign.

        - `planned` — admin added the creator to the campaign (default on create).
        - `invited` — admin sent an invitation; awaiting creator response.
        - `declined` — creator declined via TMA.
        - `agreed` — creator accepted via TMA; awaiting contract send.
        - `signing` — contract sent to TrustMe and awaiting creator signature.
        - `signed` — creator signed the contract via TrustMe. Terminal.
        - `signing_declined` — creator declined the contract via TrustMe. Terminal.
      enum: [planned, invited, declined, agreed, signing, signed, signing_declined]

    CampaignCreator:
      type: object
      description: |
        One creator's attachment to a campaign — the `campaign_creators` row
        as seen by the admin UI. `invited*`, `reminded*` and `decidedAt`
        fields are populated by chunks 12+ (notify / remind / TMA flow); on
        chunk 10 every row is `planned` with NULL timestamps and zero
        counters.
      required:
        - id
        - campaignId
        - creatorId
        - status
        - invitedCount
        - remindedCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/CampaignCreatorStatus"
        invitedAt:
          type: string
          format: date-time
          nullable: true
        invitedCount:
          type: integer
          description: Number of invitations sent for this creator (incremented by chunk 12).
        remindedAt:
          type: string
          format: date-time
          nullable: true
        remindedCount:
          type: integer
          description: Number of invitation-reminders sent for this creator (incremented by chunk 12).
        decidedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the latest creator decision (agree / decline).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AddCampaignCreatorsInput:
      type: object
      description: |
        Batch-add input for POST /campaigns/{id}/creators. Each creatorId
        must reference an existing creator that is not yet attached to this
        campaign — any violation rolls back the whole batch (strict-422).
      required: [creatorIds]
      properties:
        creatorIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 200
          description: UUIDs of the creators to attach to the campaign.

    AddCampaignCreatorsResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/CampaignCreator"

    ListCampaignCreatorsResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/CampaignCreator"

    CampaignCreatorBatchInput:
      type: object
      description: |
        Batch input shared by `POST /campaigns/{id}/notify` and
        `POST /campaigns/{id}/remind-invitation`. The shape mirrors
        AddCampaignCreatorsInput; both endpoints enforce the same
        empty/over-200/duplicate-id checks before reaching the service.
      required: [creatorIds]
      properties:
        creatorIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 200

    CampaignCreatorBatchInvalidReason:
      type: string
      description: |
        - `not_in_campaign` — the creatorId is not attached to this campaign
          (or does not exist as a creator at all; the admin UX is identical:
          refresh the list).
        - `wrong_status` — the creator is attached but the current status is
          incompatible with the action (notify needs `planned`/`declined`,
          remind-invitation needs `invited`). `currentStatus` carries the
          actual status for richer UX copy.
      enum: [not_in_campaign, wrong_status]

    CampaignCreatorBatchInvalidDetail:
      type: object
      required: [creatorId, reason]
      properties:
        creatorId:
          type: string
          format: uuid
        reason:
          $ref: "#/components/schemas/CampaignCreatorBatchInvalidReason"
        currentStatus:
          $ref: "#/components/schemas/CampaignCreatorStatus"
          nullable: true

    CampaignCreatorBatchInvalidError:
      type: object
      description: |
        Strict-422 response body for notify / remind-invitation batch
        validation. The validate-pass collects every offending creatorId in
        one sweep so the admin UI can highlight all problematic rows at once.
      required: [code, message, details]
      properties:
        code:
          type: string
          description: Always `CAMPAIGN_CREATOR_BATCH_INVALID`.
        message:
          type: string
          description: Human-readable fallback message.
        details:
          type: array
          items:
            $ref: "#/components/schemas/CampaignCreatorBatchInvalidDetail"

    CampaignCreatorBatchInvalidErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/CampaignCreatorBatchInvalidError"

    CampaignNotifyUndeliveredReason:
      type: string
      description: |
        - `bot_blocked` — Telegram refused delivery because the user blocked
          the bot or deactivated the account; the admin needs an alternative
          channel for this creator.
        - `unknown` — every other transport failure (network, timeout, 5xx
          from Telegram). The raw error is logged server-side without PII.
      enum: [bot_blocked, unknown]

    CampaignNotifyUndelivered:
      type: object
      required: [creatorId, reason]
      properties:
        creatorId:
          type: string
          format: uuid
        reason:
          $ref: "#/components/schemas/CampaignNotifyUndeliveredReason"

    CampaignNotifyResult:
      type: object
      description: |
        Partial-success result of a notify / remind-invitation batch. Only
        creators that failed delivery appear in `undelivered`; everyone else
        succeeded (`delivered_count` is `len(creatorIds) - len(undelivered)`
        on the client).
      required: [data]
      properties:
        data:
          type: object
          required: [undelivered]
          properties:
            undelivered:
              type: array
              items:
                $ref: "#/components/schemas/CampaignNotifyUndelivered"

    TmaDecisionResult:
      type: object
      description: |
        Result of a TMA agree / decline call. `status` is the
        post-decision row state (`agreed` | `declined`). `alreadyDecided`
        is true when the row was already in the requested terminal state —
        the service skipped both the UPDATE and the audit row, the call is
        an idempotent no-op.
      required: [status, alreadyDecided]
      properties:
        status:
          $ref: "#/components/schemas/CampaignCreatorStatus"
        alreadyDecided:
          type: boolean

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    tmaInitData:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Telegram WebApp initData — `Authorization: tma <init-data>`. The
        middleware HMAC-validates the payload against the bot token and
        resolves the creator by telegram_user_id. Failures map to a
        generic 401 (anti-fingerprint).
