openapi: "3.0.3"
info:
  title: UGCBoost API
  version: "0.1.0"
  description: UGCBoost platform API — contract-first, single source of truth.

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.ugcboost.kz
    description: Production

paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [system]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      summary: Authenticate with email and password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: httpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token using refresh token cookie
      tags: [auth]
      responses:
        "200":
          description: Token refreshed
          headers:
            Set-Cookie:
              description: Rotated refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      summary: Logout and invalidate refresh token
      description: |
        Public endpoint — identity is derived from the refresh-token cookie, not
        from the bearer access token. Allows a client whose access token has
        expired to still revoke its session. The Set-Cookie clear is
        unconditional (idempotent for clients without a session).
      tags: [auth]
      security: []
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              description: Cleared refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password-reset-request:
    post:
      operationId: requestPasswordReset
      summary: Request a password reset token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequestBody"
      responses:
        "200":
          description: Reset token generated (always 200 to prevent email enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password-reset:
    post:
      operationId: resetPassword
      summary: Reset password with a valid token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetBody"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      summary: Get current authenticated user
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brands:
    post:
      operationId: createBrand
      summary: Create a new brand
      tags: [brands]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandRequest"
      responses:
        "201":
          description: Brand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandResult"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listBrands
      summary: List brands (admin sees all, manager sees own)
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBrandsResult"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brands/{brandID}:
    parameters:
      - name: brandID
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getBrand
      summary: Get brand details with managers
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Brand details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBrandResult"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateBrand
      summary: Update brand
      tags: [brands]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrandRequest"
      responses:
        "200":
          description: Brand updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandResult"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBrand
      summary: Delete brand
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Brand deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brands/{brandID}/managers:
    parameters:
      - name: brandID
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: assignManager
      summary: Assign manager to brand
      tags: [brands]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignManagerRequest"
      responses:
        "201":
          description: Manager assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignManagerResult"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit-logs:
    get:
      operationId: listAuditLogs
      summary: List audit logs (admin only)
      tags: [audit]
      security:
        - bearerAuth: []
      parameters:
        - name: actor_id
          in: query
          schema:
            type: string
        - name: entity_type
          in: query
          schema:
            type: string
        - name: entity_id
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: date_from
          in: query
          schema:
            type: string
            format: date-time
        - name: date_to
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogsResult"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brands/{brandID}/managers/{userID}:
    parameters:
      - name: brandID
        in: path
        required: true
        schema:
          type: string
      - name: userID
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: removeManager
      summary: Remove manager from brand
      tags: [brands]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Manager removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dictionaries/{type}:
    get:
      operationId: listDictionary
      summary: List entries for a public dictionary (categories, cities)
      description: |
        Returns the active entries of the requested dictionary, sorted by
        sort_order then code. Used by the public landing page to render the
        category and city pickers. Public endpoint (no authentication).
      tags: [dictionaries]
      security: []
      parameters:
        - name: type
          in: path
          required: true
          description: Dictionary type to list.
          schema:
            type: string
            enum: [categories, cities]
      responses:
        "200":
          description: Dictionary entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DictionaryListResult"
        "404":
          description: Unknown dictionary type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /creators/applications:
    post:
      operationId: submitCreatorApplication
      summary: Submit a creator application from the public landing page
      description: |
        Public endpoint (no authentication). Accepts creator personal data,
        social accounts, selected categories and four mandatory consents, then
        atomically stores the application, its related rows and an audit entry
        inside a single DB transaction. Returns the new application id and a
        Telegram deep-link the creator must open to bind their TG user to the
        application.
      tags: [creators]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorApplicationSubmitRequest"
      responses:
        "201":
          description: Application accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorApplicationSubmitResult"
        "409":
          description: Active application for this IIN already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /creators/applications/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getCreatorApplication
      summary: Get full creator application aggregate (admin only)
      description: |
        Returns the full aggregate of a creator application: main personal
        fields plus linked categories, social accounts and consents. Used by
        the moderation UI to review a submitted application. Admin role is
        required — non-admin callers receive 403 regardless of whether the
        application exists, so the endpoint never leaks application IDs.
      tags: [creators]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Application aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCreatorApplicationResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: dev

    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. CREATOR_NOT_FOUND)
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable fallback message (English)
          example: Invalid input

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/APIError"

    MessageData:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Operation successful

    MessageResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/MessageData"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@ugcboost.kz
        password:
          type: string
          minLength: 6
          example: "password123"

    LoginData:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    LoginResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/LoginData"

    PasswordResetRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetBody:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 6

    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, brand_manager]

    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/User"

    CreateBrandRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        logoUrl:
          type: string

    UpdateBrandRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        logoUrl:
          type: string

    Brand:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BrandResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Brand"

    BrandListItem:
      type: object
      required: [id, name, managerCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
        managerCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListBrandsData:
      type: object
      required: [brands]
      properties:
        brands:
          type: array
          items:
            $ref: "#/components/schemas/BrandListItem"

    ListBrandsResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ListBrandsData"

    ManagerInfo:
      type: object
      required: [userId, email, assignedAt]
      properties:
        userId:
          type: string
        email:
          type: string
        assignedAt:
          type: string
          format: date-time

    BrandDetailData:
      type: object
      required: [id, name, createdAt, updatedAt, managers]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        managers:
          type: array
          items:
            $ref: "#/components/schemas/ManagerInfo"

    GetBrandResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/BrandDetailData"

    AssignManagerRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string

    AssignManagerData:
      type: object
      required: [userId, email, role]
      properties:
        userId:
          type: string
        email:
          type: string
        role:
          type: string
        tempPassword:
          type: string

    AssignManagerResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AssignManagerData"

    AuditLogEntry:
      type: object
      required: [id, actorRole, action, entityType, ipAddress, createdAt]
      properties:
        id:
          type: string
        actorId:
          type: string
          nullable: true
          description: Null for system / public actions (e.g. public creator application submit).
        actorRole:
          type: string
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        oldValue: {}
        newValue: {}
        ipAddress:
          type: string
        createdAt:
          type: string
          format: date-time

    ListAuditLogsData:
      type: object
      required: [logs, total, page, perPage]
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        total:
          type: integer
          format: int64
        page:
          type: integer
        perPage:
          type: integer

    AuditLogsResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ListAuditLogsData"

    DictionaryEntry:
      type: object
      description: Single entry in a public dictionary (category, city, etc.).
      required: [code, name, sortOrder]
      properties:
        code:
          type: string
          description: Stable machine-readable identifier (snake_case).
        name:
          type: string
          description: Human-readable label rendered to the user.
        sortOrder:
          type: integer
          description: Sort key — lower values appear first in the UI.

    ListDictionaryData:
      type: object
      required: [type, items]
      properties:
        type:
          type: string
          description: Dictionary type echoed back to the client.
        items:
          type: array
          items:
            $ref: "#/components/schemas/DictionaryEntry"

    DictionaryListResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ListDictionaryData"

    SocialPlatform:
      type: string
      description: Supported social network for creator accounts (MVP scope).
      enum: [instagram, tiktok, threads]

    SocialAccountInput:
      type: object
      required: [platform, handle]
      properties:
        platform:
          $ref: "#/components/schemas/SocialPlatform"
        handle:
          type: string
          description: Account handle or public identifier on the given platform.
          minLength: 1
          maxLength: 128

    CreatorApplicationSubmitRequest:
      type: object
      required:
        - lastName
        - firstName
        - iin
        - phone
        - city
        - categories
        - socials
        - acceptedAll
      properties:
        lastName:
          type: string
          minLength: 1
          maxLength: 128
        firstName:
          type: string
          minLength: 1
          maxLength: 128
        middleName:
          type: string
          maxLength: 128
          description: Optional patronymic (not every applicant has one).
        iin:
          type: string
          description: Kazakhstani individual identification number (12 digits).
          pattern: "^[0-9]{12}$"
        phone:
          type: string
          minLength: 1
          maxLength: 32
        city:
          type: string
          minLength: 1
          maxLength: 128
        address:
          type: string
          nullable: true
          maxLength: 512
          description: |
            Optional legal/postal address. Empty on the landing form (the bot
            collects it later); admins may patch it via moderation tooling.
        categories:
          type: array
          description: |
            One or more category codes from the categories catalogue. Must be non-empty.
            Maximum three codes; submissions with more are rejected with 422.
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 64
        categoryOtherText:
          type: string
          nullable: true
          maxLength: 200
          description: |
            Free-text description of the creator's niche when "other" appears in
            categories. Required when "other" is present (otherwise the request is
            rejected with 422 VALIDATION_ERROR). Ignored when "other" is absent.
        socials:
          type: array
          description: One or more social accounts. Multiple handles on the same platform are allowed.
          minItems: 1
          items:
            $ref: "#/components/schemas/SocialAccountInput"
        acceptedAll:
          type: boolean
          description: |
            Single consent flag covering all four canonical consent types
            (processing / third_party / cross_border / terms). The legal model
            (privacy-policy.md §9.2) treats acceptance of the Privacy Policy as
            unconditional consent to all four. Backend writes four rows in
            creator_application_consents bound to the current document versions.
            Must be true; otherwise the request is rejected with 422 MISSING_CONSENT.

    CreatorApplicationSubmitData:
      type: object
      required: [applicationId, telegramBotUrl]
      properties:
        applicationId:
          type: string
          format: uuid
          description: UUID of the newly created application (also embedded into the bot deep-link).
        telegramBotUrl:
          type: string
          format: uri
          description: Deep-link to the Telegram bot carrying application id as start parameter.

    CreatorApplicationSubmitResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApplicationSubmitData"

    CreatorApplicationDetailCategory:
      type: object
      required: [code, name, sortOrder]
      properties:
        code:
          type: string
          description: Stable category code from the categories dictionary.
        name:
          type: string
          description: Display name at the time the read was served.
        sortOrder:
          type: integer
          description: Catalogue ordering hint copied from the dictionary row.

    CreatorApplicationDetailCity:
      type: object
      required: [code, name, sortOrder]
      properties:
        code:
          type: string
          description: Stable city code from the cities dictionary (or the raw stored value when the dictionary entry has been deactivated).
        name:
          type: string
          description: Display name resolved against the dictionary at read time. Falls back to the code when the dictionary entry no longer exists.
        sortOrder:
          type: integer
          description: Catalogue ordering hint from the dictionary row. Falls back to 0 for deactivated/unknown codes.

    CreatorApplicationDetailSocial:
      type: object
      required: [platform, handle]
      properties:
        platform:
          $ref: "#/components/schemas/SocialPlatform"
        handle:
          type: string

    CreatorApplicationDetailConsent:
      type: object
      required: [consentType, acceptedAt, documentVersion, ipAddress, userAgent]
      properties:
        consentType:
          type: string
          enum: [processing, third_party, cross_border, terms]
          description: Canonical consent type captured at submission time.
        acceptedAt:
          type: string
          format: date-time
        documentVersion:
          type: string
          description: Document version stamp recorded at the moment of consent.
        ipAddress:
          type: string
          description: Client IP recorded at submission (raw stored as-is).
        userAgent:
          type: string
          description: Truncated User-Agent recorded at submission.

    TelegramLink:
      type: object
      description: Telegram account linked to a creator application via /start deep-link.
      required: [telegramUserId, linkedAt]
      properties:
        telegramUserId:
          type: integer
          format: int64
          description: Telegram numeric user id (BIGINT) — stable identifier of the linked account.
        telegramUsername:
          type: string
          nullable: true
          description: Telegram @username at link time (no leading @). Nullable.
        telegramFirstName:
          type: string
          nullable: true
          description: Telegram first_name at link time. Nullable.
        telegramLastName:
          type: string
          nullable: true
          description: Telegram last_name at link time. Nullable.
        linkedAt:
          type: string
          format: date-time
          description: Timestamp of the successful link.

    CreatorApplicationDetailData:
      type: object
      required:
        - id
        - lastName
        - firstName
        - iin
        - birthDate
        - phone
        - city
        - status
        - createdAt
        - updatedAt
        - categories
        - socials
        - consents
      properties:
        id:
          type: string
          format: uuid
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        iin:
          type: string
          description: Kazakhstani individual identification number (12 digits).
        birthDate:
          type: string
          format: date
          description: Birth date derived from the IIN at submission time.
        phone:
          type: string
        city:
          $ref: "#/components/schemas/CreatorApplicationDetailCity"
        address:
          type: string
          nullable: true
        categoryOtherText:
          type: string
          nullable: true
          description: Free-text niche description when categories include "other".
        status:
          type: string
          enum: [pending, approved, rejected, blocked]
          description: Moderation status of the application.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        categories:
          type: array
          description: Categories selected by the creator, sorted by sort_order then code.
          items:
            $ref: "#/components/schemas/CreatorApplicationDetailCategory"
        socials:
          type: array
          description: Social accounts attached to the application, sorted by platform then handle.
          items:
            $ref: "#/components/schemas/CreatorApplicationDetailSocial"
        consents:
          type: array
          description: |
            Consents in canonical order (processing → third_party → cross_border → terms),
            independent of the order they appear in the database.
          items:
            $ref: "#/components/schemas/CreatorApplicationDetailConsent"
        telegramLink:
          allOf:
            - $ref: "#/components/schemas/TelegramLink"
          nullable: true
          description: |
            Telegram account linked to this application. Null when the creator
            has not yet opened the bot.

    GetCreatorApplicationResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CreatorApplicationDetailData"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
