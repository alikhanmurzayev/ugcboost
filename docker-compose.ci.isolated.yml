# CI isolated E2E: spins up full stack from pre-built GHCR images.
# Usage: IMAGE_PREFIX=ghcr.io/.../ugcboost IMAGE_TAG=staging docker compose -f docker-compose.ci.isolated.yml up -d --wait
name: ugcboost-ci-isolated

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ugcboost
      POSTGRES_PASSWORD: ugcboost_test
      POSTGRES_DB: ugcboost_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ugcboost"]
      interval: 2s
      timeout: 5s
      retries: 10

  migrations:
    image: ${IMAGE_PREFIX}/backend:${IMAGE_TAG}
    entrypoint: ["goose", "-dir", "/migrations", "postgres", "postgres://ugcboost:ugcboost_test@postgres:5432/ugcboost_test?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: ${IMAGE_PREFIX}/backend:${IMAGE_TAG}
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgres://ugcboost:ugcboost_test@postgres:5432/ugcboost_test?sslmode=disable
      PORT: "8080"
      JWT_SECRET: test-secret-for-e2e
      JWT_EXPIRY: "15m"
      CORS_ORIGINS: "http://localhost:3001,http://localhost:3002"
      LOG_LEVEL: warn
      ENVIRONMENT: local
      ADMIN_EMAIL: admin@ugcboost.kz
      ADMIN_PASSWORD: admin123
      LIVEDUNE_MOCK: "true"
      TRUSTME_MOCK: "true"
      TELEGRAM_MOCK: "true"
      EMAIL_MOCK: "true"
      STORAGE_MOCK: "true"
    depends_on:
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 10

  web:
    image: ${IMAGE_PREFIX}/web:${IMAGE_TAG}
    ports:
      - "3001:80"
    environment:
      API_URL: http://localhost:8082
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 2s
      timeout: 3s
      retries: 5

  tma:
    image: ${IMAGE_PREFIX}/tma:${IMAGE_TAG}
    ports:
      - "3002:80"
    environment:
      API_URL: http://localhost:8082
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 2s
      timeout: 3s
      retries: 5

  landing:
    image: ${IMAGE_PREFIX}/landing:${IMAGE_TAG}
    ports:
      - "3003:80"
    environment:
      API_URL: http://localhost:8082
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 2s
      timeout: 3s
      retries: 5
