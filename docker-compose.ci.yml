# CI override: pull pre-built images from GHCR instead of building from source.
# Usage: docker compose -f docker-compose.test.yml -f docker-compose.ci.yml up -d --wait
#
# Requires IMAGE_PREFIX and IMAGE_TAG env vars:
#   IMAGE_PREFIX=ghcr.io/alikhanmurzayev/ugcboost IMAGE_TAG=staging

services:
  migrations:
    build: !reset null
    image: ${IMAGE_PREFIX}/migrations:${IMAGE_TAG}

  backend:
    build: !reset null
    image: ${IMAGE_PREFIX}/backend:${IMAGE_TAG}

  web:
    build: !reset null
    image: ${IMAGE_PREFIX}/web:${IMAGE_TAG}
