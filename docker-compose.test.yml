name: ugcboost-test

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ugcboost
      POSTGRES_PASSWORD: ugcboost_test
      POSTGRES_DB: ugcboost_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ugcboost"]
      interval: 2s
      timeout: 5s
      retries: 10

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    environment:
      DATABASE_URL: postgres://ugcboost:ugcboost_test@postgres:5432/ugcboost_test?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgres://ugcboost:ugcboost_test@postgres:5432/ugcboost_test?sslmode=disable
      PORT: "8080"
      JWT_SECRET: test-secret-for-e2e
      JWT_EXPIRY: "15m"
      CORS_ORIGINS: "http://localhost:8082"
      LOG_LEVEL: warn
      ADMIN_EMAIL: admin@ugcboost.kz
      ADMIN_PASSWORD: admin123
      ENABLE_TEST_ENDPOINTS: "true"
      LIVEDUNE_MOCK: "true"
      TRUSTME_MOCK: "true"
      TELEGRAM_MOCK: "true"
      EMAIL_MOCK: "true"
      STORAGE_MOCK: "true"
    depends_on:
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 10
