# Local development infrastructure.
# App services (backend, web, tma) run outside Docker — see Makefile targets.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ugcboost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ugcboost_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ugcboost}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ugcboost}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
